              <FieldRow label="Color hue (0–360)">
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <input style={{ ...inputStyle, width: 90 }} type="number" min="0" max="360" value={form.hue} onChange={e => setForm({ ...form, hue: parseInt(e.target.value) || 0 })} />
                  <div style={{ flex: 1, height: 36, borderRadius: 9, background: `hsl(${form.hue},65%,50%)`, border: "1px solid var(--line)", transition: "background 0.2s" }} />
                </div>
              </FieldRow>
              <FieldRow label="Description"><textarea style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} value={form.blurb} onChange={e => setForm({ ...form, blurb: e.target.value })} placeholder="Short description shown to customers" /></FieldRow>
              {err && <div style={{ color: "var(--red-500)", fontSize: 13, marginBottom: 12 }}>{err}</div>}
              <div style={{ display: "flex", gap: 10 }}>
                <Btn full type="submit">{editing ? "Update" : "Create"}</Btn>
                <Btn full variant="ghost" type="button" onClick={() => setModal(false)}>Cancel</Btn>
              </div>
            </form>
          </MgmtModal>
        </React.Fragment>
      );
    }

    function ProductsTab() {
      const [items, setItems] = useState([]);
      const [suppliers, setSuppliers] = useState([]);
      const [categories, setCategories] = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal, setModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ name: "", brand: "", categoryId: "", supplierId: "", price: "", unit: "", par: "", size: "", costPrice: "", featuredImage: "" });
      const [err, setErr] = useState("");
      const [q, setQ] = useState("");

      const load = async () => {
        setLoading(true);
        try {
          const [rp, rs, rc] = await Promise.all([
            fetch(`${API_BASE}/products`, { headers: authHeaders() }),
            fetch(`${API_BASE}/suppliers`, { headers: authHeaders() }),
            fetch(`${API_BASE}/categories`, { headers: authHeaders() }),
          ]);
          if (rp.ok) setItems(await rp.json());
          if (rs.ok) setSuppliers(await rs.json());
          if (rc.ok) setCategories(await rc.json());
        } finally { setLoading(false); }
      };
      useEffect(() => { load(); }, []);

      const openCreate = () => { setEditing(null); setForm({ name: "", brand: "", categoryId: categories[0]?.id || "", supplierId: suppliers[0]?.id || "", price: "", unit: "", par: "", size: "", costPrice: "", featuredImage: "" }); setErr(""); setModal(true); };
      const openEdit = p => { setEditing(p.id); setForm({ name: p.name, brand: p.brand || "", categoryId: p.categoryId || p.category_id || "", supplierId: p.supplierId || p.supplier_id || "", price: p.price, unit: p.unit, par: p.par, size: p.size || "", costPrice: p.costPrice || p.cost_price || "", featuredImage: p.featuredImage || "" }); setErr(""); setModal(true); };

      const save = async e => {
        e.preventDefault(); setErr("");
        const payload = { ...form, price: parseFloat(form.price), par: parseInt(form.par), costPrice: form.costPrice ? parseFloat(form.costPrice) : undefined, featuredImage: form.featuredImage || null };
        const url = editing ? `${API_BASE}/products/${editing}` : `${API_BASE}/products`;
        const r = await fetch(url, { method: editing ? "PUT" : "POST", headers: { ...authHeaders(), "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (r.ok) { setModal(false); load(); } else { const d = await r.json(); setErr(d.message || d.error || "Save failed"); }
      };

      const del = async p => {
        if (!confirm(`Delete product "${p.name}"?`)) return;
        const r = await fetch(`${API_BASE}/products/${p.id}`, { method: "DELETE", headers: authHeaders() });
        if (r.ok) load(); else { const d = await r.json(); alert(d.error || "Delete failed"); }
      };

      const catName = id => categories.find(c => c.id === id)?.name || id || "—";
      const supName = id => suppliers.find(s => s.id === id)?.name || id || "—";
      const filtered = q ? items.filter(p => p.name.toLowerCase().includes(q.toLowerCase())) : items;

      return (
        <React.Fragment>
          <div style={{ display: "flex", gap: 12, marginBottom: 14, alignItems: "center" }}>
            <Btn size="sm" icon="plus" onClick={openCreate}>Add Product</Btn>
            <div style={{ position: "relative", flex: 1, maxWidth: 280 }}>
              <span style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: "var(--text-3)" }}><Icon name="search" size={15} /></span>
              <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search products…" style={{ ...inputStyle, paddingLeft: 32 }} />
            </div>
            <span style={{ fontSize: 13, color: "var(--text-3)" }}>{filtered.length} of {items.length}</span>
          </div>
          {loading ? <div style={{ color: "var(--text-3)", padding: 32, textAlign: "center" }}>Loading…</div> : (
            <MgmtTable
              cols={["Name", "Category", "Price", "Unit", "Par"]}
              rows={filtered.map(p => ({ id: p.id, raw: p, cells: [
                <span style={{ fontWeight: 600 }}>{p.name}{p.brand ? <span style={{ fontWeight: 400, color: "var(--text-3)", fontSize: 12 }}> · {p.brand}</span> : null}</span>,
                <span style={{ fontSize: 13 }}>{catName(p.categoryId || p.category_id)}</span>,
                <span className="tnum">{window.G.money(p.price)}</span>,
                p.unit,
                <span className="tnum">{p.par}</span>,
              ]}))}
              onEdit={openEdit} onDelete={del}
            />
          )}
          <MgmtModal open={modal} title={editing ? "Edit Product" : "Add Product"} onClose={() => setModal(false)}>
            <form onSubmit={save}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                <FieldRow label="Name *"><input style={inputStyle} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} required /></FieldRow>
                <FieldRow label="Brand"><input style={inputStyle} value={form.brand} onChange={e => setForm({ ...form, brand: e.target.value })} /></FieldRow>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                <FieldRow label="Category *">
                  <select style={{ ...inputStyle, appearance: "none" }} value={form.categoryId} onChange={e => setForm({ ...form, categoryId: e.target.value })} required>
                    <option value="">Select…</option>
                    {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </FieldRow>
                <FieldRow label="Supplier *">
                  <select style={{ ...inputStyle, appearance: "none" }} value={form.supplierId} onChange={e => setForm({ ...form, supplierId: e.target.value })} required>
                    <option value="">Select…</option>
                    {suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </FieldRow>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                <FieldRow label="Price *"><input style={inputStyle} type="number" step="0.01" min="0" value={form.price} onChange={e => setForm({ ...form, price: e.target.value })} required placeholder="0.00" /></FieldRow>
                <FieldRow label="Unit *"><input style={inputStyle} value={form.unit} onChange={e => setForm({ ...form, unit: e.target.value })} required placeholder="lb" /></FieldRow>
                <FieldRow label="Par level *"><input style={inputStyle} type="number" min="1" value={form.par} onChange={e => setForm({ ...form, par: e.target.value })} required placeholder="20" /></FieldRow>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                <FieldRow label="Size"><input style={inputStyle} value={form.size} onChange={e => setForm({ ...form, size: e.target.value })} placeholder="500g" /></FieldRow>
                <FieldRow label="Cost price"><input style={inputStyle} type="number" step="0.01" min="0" value={form.costPrice} onChange={e => setForm({ ...form, costPrice: e.target.value })} placeholder="0.00" /></FieldRow>
              </div>
              <FieldRow label="Product Image">
                <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                  <label style={{ flex: 1, display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 9, border: "2px dashed var(--line)", cursor: "pointer", background: "var(--surface-2)", color: "var(--text-2)", fontSize: 13, fontWeight: 500 }}>
                    <Icon name="plus" size={16} />
                    {form.featuredImage ? "Change image" : "Upload image"}
                    <input type="file" accept="image/*" style={{ display: "none" }} onChange={e => {
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = ev => setForm(f => ({ ...f, featuredImage: ev.target.result }));
                      reader.readAsDataURL(file);
                    }} />
                  </label>
                  {form.featuredImage && (
                    <div style={{ position: "relative", width: 56, height: 56, borderRadius: 9, overflow: "hidden", border: "1px solid var(--line)", flexShrink: 0 }}>
                      <img src={form.featuredImage} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                      <button type="button" onClick={() => setForm(f => ({ ...f, featuredImage: "" }))} style={{ position: "absolute", top: 2, right: 2, width: 18, height: 18, borderRadius: 999, background: "rgba(0,0,0,0.6)", border: "none", color: "#fff", fontSize: 11, cursor: "pointer", display: "grid", placeItems: "center" }}>×</button>
                    </div>
                  )}
                </div>
              </FieldRow>
              {err && <div style={{ color: "var(--red-500)", fontSize: 13, margin: "10px 0" }}>{err}</div>}
              <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
                <Btn full type="submit">{editing ? "Update" : "Create"}</Btn>
                <Btn full variant="ghost" type="button" onClick={() => setModal(false)}>Cancel</Btn>
              </div>
            </form>
          </MgmtModal>
        </React.Fragment>
      );
    }

    /* ========== MAIN APP ========== */
    const STAFF_ROUTES = ["dashboard","fulfill","receive","transfer","manage-shops","manage-staff","manage-categories"];

    function staffPathToRoute(pathname) {
      const seg = pathname.replace(/^\//, "") || "dashboard";
      return STAFF_ROUTES.includes(seg) ? seg : "dashboard";
    }

    function EmailSettingsScreen() {
      const [templates, setTemplates] = React.useState([]);
      const [selected, setSelected] = React.useState(null);
      const [subject, setSubject] = React.useState("");
      const [body, setBody] = React.useState("");
      const [enabled, setEnabled] = React.useState(true);
      const [testEmail, setTestEmail] = React.useState("");
      const [saving, setSaving] = React.useState(false);
      const [testing, setTesting] = React.useState(false);
      const [msg, setMsg] = React.useState(null);

      React.useEffect(() => {
        apiFetch(`${API_BASE}/email/templates`)
          .then(r => r && r.json())
          .then(d => {
            if (d?.templates?.length) {
              setTemplates(d.templates);
              const first = d.templates[0];
              setSelected(first);
              setSubject(first.subject);
              setBody(first.body);
              setEnabled(first.enabled);
            }
          })
          .catch(() => setMsg({ type: "error", text: "Failed to load templates." }));
      }, []);

      const selectTemplate = (tpl) => {
        setSelected(tpl);
        setSubject(tpl.subject);
        setBody(tpl.body);
        setEnabled(tpl.enabled);
        setMsg(null);
      };

      const handleSave = async () => {
        if (!selected) return;
        setSaving(true); setMsg(null);
        try {
          const res = await apiFetch(`${API_BASE}/email/templates/${selected.type}`, {
            method: "PUT",
            body: JSON.stringify({ subject, body, enabled }),
          });
          const d = await res.json();
          if (!res.ok) { setMsg({ type: "error", text: d.error || "Save failed." }); return; }
          setTemplates(prev => prev.map(t => t.type === selected.type ? d.template : t));
          setSelected(d.template);
          setMsg({ type: "success", text: "Template saved." });
        } catch { setMsg({ type: "error", text: "Network error." }); }
        finally { setSaving(false); }
      };

      const handleTest = async () => {
        if (!testEmail || !selected) return;
        setTesting(true); setMsg(null);
        try {
          const res = await apiFetch(`${API_BASE}/email/test`, {
            method: "POST",
            body: JSON.stringify({ type: selected.type, to: testEmail }),
          });
          const d = await res.json();
          if (!res.ok) { setMsg({ type: "error", text: d.error || "Test failed." }); return; }
          setMsg({ type: "success", text: d.message });
        } catch { setMsg({ type: "error", text: "Network error." }); }
        finally { setTesting(false); }
      };

      const placeholders = {
        password_reset: ["{{name}}", "{{reset_link}}"],
      };

      const card = { background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 24 };

      return (
        <div style={{ padding: 28, maxWidth: 900, margin: "0 auto" }}>
          <h2 style={{ fontSize: 22, fontWeight: 800, marginBottom: 4 }}>Email Settings</h2>
          <p style={{ color: "var(--text-2)", fontSize: 14, marginBottom: 24 }}>Edit email templates sent to customers.</p>

          {msg && (
            <div style={{ padding: "12px 16px", borderRadius: 10, marginBottom: 20, fontSize: 13, fontWeight: 600,
              background: msg.type === "success" ? "var(--green-50,#f0fdf4)" : "var(--red-100,#fee2e2)",
              color: msg.type === "success" ? "#15803d" : "#b91c1c",
              border: `1px solid ${msg.type === "success" ? "#bbf7d0" : "#fca5a5"}` }}>
              {msg.text}
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "220px 1fr", gap: 20 }}>
            {/* Template list */}
            <div style={card}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 10 }}>Templates</div>
              {templates.map(tpl => (
                <button key={tpl.type} onClick={() => selectTemplate(tpl)} style={{
                  width: "100%", textAlign: "left", padding: "10px 12px", borderRadius: 8, border: "none",
                  background: selected?.type === tpl.type ? "var(--primary)" : "transparent",
                  color: selected?.type === tpl.type ? "#fff" : "var(--text)",
                  fontFamily: "var(--font-sans)", fontSize: 13.5, fontWeight: 600, cursor: "pointer", marginBottom: 2,
                }}>
                  {tpl.label}
                </button>
              ))}
            </div>

            {/* Editor */}
            {selected && (
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={card}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <span style={{ fontSize: 15, fontWeight: 700 }}>{selected.label}</span>
                    <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, cursor: "pointer" }}>
                      <input type="checkbox" checked={enabled} onChange={e => setEnabled(e.target.checked)} />
                      Enabled
                    </label>
                  </div>

                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-2)", marginBottom: 6 }}>SUBJECT</div>
                    <input value={subject} onChange={e => setSubject(e.target.value)}
                      style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid var(--line)",
                        background: "var(--bg)", color: "var(--text)", fontFamily: "var(--font-sans)", fontSize: 14, boxSizing: "border-box" }} />
                  </div>

                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-2)", marginBottom: 6 }}>BODY (HTML)</div>
                    <textarea value={body} onChange={e => setBody(e.target.value)} rows={14}
                      style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid var(--line)",
                        background: "var(--bg)", color: "var(--text)", fontFamily: "monospace", fontSize: 12.5,
                        resize: "vertical", boxSizing: "border-box" }} />
                  </div>

                  <div style={{ background: "var(--surface-2,#f8f8f8)", borderRadius: 8, padding: "10px 14px", marginBottom: 16 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-2)", marginBottom: 6 }}>AVAILABLE PLACEHOLDERS</div>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {(placeholders[selected.type] || []).map(p => (
                        <code key={p} style={{ background: "var(--line)", padding: "2px 8px", borderRadius: 4, fontSize: 12 }}>{p}</code>
                      ))}
                    </div>
                  </div>

                  <button onClick={handleSave} disabled={saving}
                    style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: "var(--primary)",
                      color: "#fff", fontFamily: "var(--font-sans)", fontSize: 14, fontWeight: 700, cursor: saving ? "not-allowed" : "pointer", opacity: saving ? 0.7 : 1 }}>
                    {saving ? "Saving…" : "Save Template"}
                  </button>
                </div>

                {/* Test send */}
                <div style={card}>
                  <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>Send Test Email</div>
                  <p style={{ fontSize: 13, color: "var(--text-2)", marginBottom: 14 }}>
                    Sends the template with sample data to verify your Gmail config is working.
                  </p>
                  <div style={{ display: "flex", gap: 10 }}>
                    <input type="email" value={testEmail} onChange={e => setTestEmail(e.target.value)}
                      placeholder="recipient@example.com"
                      style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: "1px solid var(--line)",
                        background: "var(--bg)", color: "var(--text)", fontFamily: "var(--font-sans)", fontSize: 14 }} />
                    <button onClick={handleTest} disabled={testing || !testEmail}
                      style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid var(--line)",
                        background: "var(--surface)", color: "var(--text)", fontFamily: "var(--font-sans)",
                        fontSize: 14, fontWeight: 600, cursor: testing || !testEmail ? "not-allowed" : "pointer",
                        opacity: testing || !testEmail ? 0.6 : 1 }}>
                      {testing ? "Sending…" : "Send Test"}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function StaffApp() {
      const savedUser = window.G.currentUser;
      const [shopId, setShopId] = useState(savedUser ? (savedUser.shopId || "msn") : null);
      const [route, setRoute] = useState(() => shopId ? staffPathToRoute(window.location.pathname) : "dashboard");

      const navigate = (newRoute) => {
        window.history.pushState({ route: newRoute }, "", "/" + newRoute);
        setRoute(newRoute);
      };

      useEffect(() => {
        const onPop = (e) => {
          const r = e.state?.route || staffPathToRoute(window.location.pathname);
          setRoute(r);
        };
        window.addEventListener("popstate", onPop);
        if (shopId) {
          window.history.replaceState({ route }, "", "/" + route);
        }
        return () => window.removeEventListener("popstate", onPop);
      }, []);

      const handleLogin = (sId, user) => {
        setShopId(sId);
        navigate("dashboard");
      };

      const handleLogout = async () => {
        const token = sessionStorage.getItem("staff_token");
        if (token) {
          try {
            await fetch(`${API_BASE}/auth/logout`, {
              method: "POST",
              headers: { "Authorization": `Bearer ${token}` },
            });
          } catch { /* ignore network error on logout */ }
        }
        sessionStorage.removeItem("staff_token");
        sessionStorage.removeItem("staff_refresh_token");
        sessionStorage.removeItem("staff_user");
        window.G.token = null;
        window.G.currentUser = null;
        window.history.pushState({}, "", "/");
        setShopId(null);
      };

      if (!shopId) return <StaffLogin onLogin={handleLogin} />;

      const screenMap = {
        dashboard: () => <DashboardScreen shopId={shopId} setRoute={navigate} />,
        fulfill: () => <FulfillScreen shopId={shopId} setRoute={navigate} />,
        receive: () => <ReceiveScreen shopId={shopId} setRoute={navigate} />,
        transfer: () => <TransferScreen shopId={shopId} setRoute={navigate} />,
        "manage-shops":      () => <AdminOnly user={window.G.currentUser}><ManageShopsScreen /></AdminOnly>,
        "manage-staff":      () => <AdminOnly user={window.G.currentUser}><ManageStaffScreen /></AdminOnly>,
        "manage-categories": () => <AdminOnly user={window.G.currentUser}><ManageCategoriesScreen /></AdminOnly>,
        "email-settings":    () => <AdminOnly user={window.G.currentUser}><EmailSettingsScreen /></AdminOnly>,
      };

      const renderScreen = screenMap[route] || screenMap.dashboard;

      return (
        <Shell shopId={shopId} route={route} setRoute={navigate} onLogout={handleLogout} user={window.G.currentUser}>
          {renderScreen()}
        </Shell>
      );
    }

    try {
      console.log("🎯 Creating React root...");
      const root = ReactDOM.createRoot(document.getElementById("root"));
      console.log("🎯 Rendering Staff App...");
      root.render(<StaffApp />);
      console.log("✅ Staff App rendered successfully!");
    } catch (error) {
      console.error("❌ ERROR:", error);
      console.error("Stack:", error.stack);
      document.getElementById("root").innerHTML = `<div style="padding:20px; color:red; font-family:monospace;"><h2>Error loading app:</h2><pre>${error.message}</pre></div>`;
    }
  </script>
</body>
</html>
