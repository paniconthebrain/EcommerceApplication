<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoGO Pantry — Staff Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px oklch(0 0 0 / 0.07);
      --shadow-lg: 0 10px 24px oklch(0 0 0 / 0.12);
      --bg: oklch(0.98 0 0);
      --surface: oklch(1 0 0);
      --surface-2: oklch(0.96 0.001 215);
      --line: oklch(0.88 0.003 215);
      --text: oklch(0.2 0.004 215);
      --text-2: oklch(0.5 0.005 215);
      --text-3: oklch(0.65 0.004 215);
      --primary: oklch(0.55 0.17 152);
      --primary-ink: oklch(1 0 0);
      --green-100: oklch(0.97 0.04 152);
      --green-300: oklch(0.9 0.08 152);
      --green-500: oklch(0.68 0.13 152);
      --green-600: oklch(0.55 0.17 152);
      --green-700: oklch(0.42 0.14 152);
      --red-100: oklch(0.97 0.04 25);
      --red-300: oklch(0.9 0.08 25);
      --red-500: oklch(0.65 0.15 25);
      --red-700: oklch(0.42 0.14 25);
      --amber-100: oklch(0.98 0.03 78);
      --amber-500: oklch(0.75 0.13 78);
      --amber-600: oklch(0.65 0.15 78);
      --blue-100: oklch(0.97 0.04 245);
      --blue-500: oklch(0.6 0.15 245);
    }
    body, html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    #root {
      width: 100%;
      height: 100%;
      display: flex;
    }
  </style>
  <link rel="stylesheet" href="./staff/staff-styles.css">
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"
          integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"
          integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"
          integrity="sha384-KCD0A3BqTNZfWlXJcL7fKzDri97vicyNr4NUIr0vX6K9PZ0X5hOTeEbFh99jPEST" crossorigin="anonymous"></script>

  <script type="text/babel">
    console.log("🚀 Staff App starting...");
    const { useState, useEffect, useMemo, useRef } = React;
    console.log("✅ React hooks loaded");

    // API BASE URL
    const API_BASE = "http://localhost:3000/api";

    // Initialize global state with mock data for staff operations
    window.G = {
      api: API_BASE,
      SHOPS: [
        { id: "msn", name: "Main Store North", code: "MSN", tint: 152, location: "123 Main St", hours: "6am - 11pm", distance: 0 },
        { id: "dst", name: "Downtown Store", code: "DST", tint: 245, location: "456 Oak Ave", hours: "7am - 10pm", distance: 2.1 },
        { id: "wst", name: "West Side Shop", code: "WST", tint: 45, location: "789 Park Blvd", hours: "6am - 11pm", distance: 4.5 },
        { id: "est", name: "East Village Market", code: "EST", tint: 25, location: "321 River Rd", hours: "8am - 9pm", distance: 3.2 },
      ],
      CATEGORIES: [
        { id: "produce", name: "Produce", hue: 152 },
        { id: "dairy", name: "Dairy & Eggs", hue: 45 },
        { id: "meat", name: "Meat & Seafood", hue: 25 },
        { id: "pantry", name: "Pantry", hue: 220 },
        { id: "frozen", name: "Frozen Foods", hue: 245 },
        { id: "beverages", name: "Beverages", hue: 300 },
      ],
      PRODUCTS: [
        { id: "p1", name: "Fresh Tomatoes", cat: "produce", price: 3.99, unit: "lb", par: 40, supplier: "fresh-farms", supplier_code: "FF" },
        { id: "p2", name: "Organic Lettuce", cat: "produce", price: 2.49, unit: "head", par: 30, supplier: "fresh-farms", supplier_code: "FF" },
        { id: "p3", name: "Free Range Eggs", cat: "dairy", price: 5.99, unit: "dozen", par: 25, supplier: "happy-hens", supplier_code: "HH" },
        { id: "p4", name: "Greek Yogurt", cat: "dairy", price: 4.99, unit: "32oz", par: 20, supplier: "dairy-supreme", supplier_code: "DS" },
        { id: "p5", name: "Salmon Fillets", cat: "meat", price: 12.99, unit: "lb", par: 15, supplier: "sea-harvest", supplier_code: "SH" },
        { id: "p6", name: "Grass Fed Beef", cat: "meat", price: 8.99, unit: "lb", par: 20, supplier: "ranch-natural", supplier_code: "RN" },
        { id: "p7", name: "Whole Grain Bread", cat: "pantry", price: 3.49, unit: "loaf", par: 35, supplier: "baker-artisan", supplier_code: "BA" },
        { id: "p8", name: "Almond Butter", cat: "pantry", price: 7.99, unit: "16oz", par: 18, supplier: "nuts-world", supplier_code: "NW" },
      ],
      ORDERS: [
        { id: "ORD-001", customer: "Sarah Chen", initials: "SC", items: 5, total: 42.50, status: "new", type: "Pickup", slot: "Today · 2:00 PM", address: "123 Main St", placed: "2:14 PM", picker: null },
        { id: "ORD-002", customer: "John Miller", initials: "JM", items: 8, total: 67.25, status: "picking", type: "Delivery", slot: "Today · 3:30 PM", address: "456 Oak Ave", placed: "1:45 PM", picker: "Alex" },
        { id: "ORD-003", customer: "Emma Rodriguez", initials: "ER", items: 3, total: 24.99, status: "ready", type: "Pickup", slot: "Today · 4:00 PM", address: "789 Park Blvd", placed: "1:20 PM", picker: null },
        { id: "ORD-004", customer: "James Wilson", initials: "JW", items: 6, total: 51.75, status: "new", type: "Delivery", slot: "Today · 5:00 PM", address: "321 River Rd", placed: "2:00 PM", picker: null },
        { id: "ORD-005", customer: "Lisa Thompson", initials: "LT", items: 4, total: 38.50, status: "completed", type: "Pickup", slot: "Earlier today", address: "123 Main St", placed: "12:30 PM", picker: null },
      ],
      DELIVERIES: [
        { id: "PO-2206", supplier: "FF", status: "arrived", items: 12, eta: "Today 1:00 PM" },
        { id: "PO-2207", supplier: "HH", status: "in-transit", items: 8, eta: "Today 3:30 PM" },
        { id: "PO-2208", supplier: "DS", status: "scheduled", items: 10, eta: "Tomorrow 9:00 AM" },
      ],
      money: (n) => "$" + (parseFloat(n) || 0).toFixed(2),
      shopStock: (pid, sid) => 15 + ((pid.charCodeAt(1) + sid.charCodeAt(1)) % 35),
      stockState: (stock, par) => stock === 0 ? "out" : stock < par * 0.3 ? "critical" : stock < par * 0.6 ? "low" : "ok",
      catOf: (catId) => window.G.CATEGORIES.find(c => c.id === catId) || { id: catId, name: "Unknown", hue: 0 },
      supplierOf: (suppId) => {
        const map = {
          "FF": { id: "FF", name: "Fresh Farms Co.", type: "Produce", lead: "2 days" },
          "HH": { id: "HH", name: "Happy Hens Farm", type: "Poultry", lead: "1 day" },
          "DS": { id: "DS", name: "Dairy Supreme", type: "Dairy", lead: "1 day" },
          "SH": { id: "SH", name: "Sea Harvest Fish", type: "Seafood", lead: "2 days" },
          "RN": { id: "RN", name: "Ranch Natural", type: "Meat", lead: "2 days" },
          "BA": { id: "BA", name: "Baker Artisan", type: "Bakery", lead: "Daily" },
          "NW": { id: "NW", name: "Nuts World", type: "Specialty", lead: "3 days" },
        };
        return map[suppId] || { id: suppId, name: "Unknown Supplier", type: "General", lead: "Unknown" };
      },
    };

    // Auth token storage
    window.G.token = sessionStorage.getItem("staff_token") || null;
    window.G.currentUser = JSON.parse(sessionStorage.getItem("staff_user") || "null");

    function authHeaders() {
      return window.G.token
        ? { Authorization: `Bearer ${window.G.token}`, "Content-Type": "application/json" }
        : { "Content-Type": "application/json" };
    }

    function buildHeaders(options) {
      // For FormData (multipart), only send Authorization — let the browser set Content-Type with boundary
      if (options.body instanceof FormData) {
        return window.G.token ? { Authorization: `Bearer ${window.G.token}` } : {};
      }
      return { ...authHeaders(), ...(options.headers || {}) };
    }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { ...options, headers: buildHeaders(options) });

      if (res.status === 401) {
        // Try to refresh the token once
        const refreshToken = sessionStorage.getItem("staff_refresh_token");
        if (refreshToken) {
          try {
            const refreshRes = await fetch(`${API_BASE}/auth/refresh`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ refreshToken }),
            });
            if (refreshRes.ok) {
              const refreshData = await refreshRes.json();
              window.G.token = refreshData.token;
              sessionStorage.setItem("staff_token", refreshData.token);
              // Retry the original request with the new token
              return fetch(url, { ...options, headers: buildHeaders(options) });
            }
          } catch (_) { /* fall through to logout */ }
        }
        // Refresh failed — force re-login
        sessionStorage.clear();
        window.G.token = null;
        window.G.currentUser = null;
        window.location.reload();
        return null;
      }
      return res;
    }

    // Fetch data from backend
    async function initializeAppData() {
      try {
        const headers = authHeaders();
        const shopsRes = await fetch(`${API_BASE}/shops`, { headers });
        if (shopsRes.ok) {
          const data = await shopsRes.json();
          if (Array.isArray(data) && data.length > 0) {
            window.G.SHOPS = data.map(s => ({
              id: s.id, name: s.name, code: s.code || s.id.toUpperCase(),
              tint: parseInt(s.tint) || 152, location: s.city || s.location || "",
              hours: s.hours || "", distance: 0,
            }));
          }
        }
        const catsRes = await fetch(`${API_BASE}/categories`, { headers });
        if (catsRes.ok) {
          const data = await catsRes.json();
          if (Array.isArray(data) && data.length > 0) {
            window.G.CATEGORIES = data.map(c => ({ id: c.id, name: c.name, hue: c.hue || 152 }));
          }
        }
        const productsRes = await fetch(`${API_BASE}/products`, { headers });
        if (productsRes.ok) {
          const data = await productsRes.json();
          if (Array.isArray(data) && data.length > 0) {
            window.G.PRODUCTS = data.map(p => ({
              ...p,
              cat: p.cat || p.category_id || p.categoryId || "pantry",
              supplier_code: p.supplier_code || (p.supplier_id || p.supplierId || "").toUpperCase().slice(0, 2),
            }));
          }
        }
      } catch (error) {
        console.log("ℹ️ Using mock data for staff app");
      }
    }

    initializeAppData();

    /* ========== STAFF UI COMPONENTS ========== */
    const ICONS = {
      dashboard: "M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z",
      orders: "M3 7l1.5 12.5a1 1 0 0 0 1 .9h13a1 1 0 0 0 1-.9L21 7M3 7l2-3h14l2 3M3 7h18M9 11v4M15 11v4",
      truck: "M3 4h11v10H3zM14 8h4l3 3v3h-7M5.5 18a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3ZM17.5 18a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z",
      transfer: "M17 3l4 4-4 4M21 7H7M7 21l-4-4 4-4M3 17h14",
      clipboard: "M9 4h6v3H9zM7 5H5v16h14V5h-2M9 12h6M9 16h4",
      box: "M21 8l-9-5-9 5 9 5 9-5ZM3 8v8l9 5 9-5V8M12 13v8",
      search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM21 21l-4.3-4.3",
      bell: "M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0",
      settings: "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-2.9-1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.2-2.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 2.9-1.2V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0 1.2 2.9H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z",
      logout: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9",
      chevR: "M9 6l6 6-6 6",
      chevD: "M6 9l6 6 6-6",
      plus: "M12 5v14M5 12h14",
      minus: "M5 12h14",
      check: "M20 6L9 17l-5-5",
      alert: "M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z",
      leaf: "M11 20A7 7 0 0 1 4 13c0-6 5-9 16-9 0 9-4 12-9 12ZM4 20c2-3 5-6 9-8",
      x: "M18 6 6 18M6 6l12 12",
      pin: "M12 21s7-5.7 7-11a7 7 0 1 0-14 0c0 5.3 7 11 7 11ZM12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z",
      filter: "M3 5h18M6 12h12M10 19h4",
      users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75",
      building: "M3 21h18M9 8h1M9 12h1M9 16h1M14 8h1M14 12h1M14 16h1M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16",
      folder: "M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z",
      edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z",
      trash: "M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6",
    };

    function Icon({ name, size = 20, stroke = 2, fill = "none", style }) {
      const d = ICONS[name] || "";
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill={fill === "current" ? "currentColor" : "none"}
          stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={style}>
          {d.split("M").filter(Boolean).map((seg, i) => <path key={i} d={"M" + seg} />)}
        </svg>
      );
    }

    function Logo({ size = 30 }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{
            width: size, height: size, borderRadius: 9, background: "var(--primary)",
            display: "grid", placeItems: "center", color: "white", flexShrink: 0
          }}>
            <Icon name="leaf" size={size * 0.62} stroke={2.4} />
          </div>
          <span style={{ fontWeight: 800, fontSize: size * 0.6, letterSpacing: "-0.02em", color: "var(--text)" }}>
            GoGO<span style={{ color: "var(--primary)" }}>Pantry</span>
          </span>
        </div>
      );
    }

    function Pill({ tone = "neutral", children, dot = false, size = "md" }) {
      const map = {
        ok: ["var(--green-100)", "var(--green-700)"],
        low: ["var(--amber-100)", "oklch(0.5 0.12 78)"],
        critical: ["var(--red-100)", "var(--red-500)"],
        out: ["var(--red-100)", "var(--red-500)"],
        info: ["var(--blue-100)", "var(--blue-500)"],
        warn: ["var(--amber-100)", "var(--amber-600)"],
        neutral: ["var(--surface-2)", "var(--text-2)"],
      };
      const [bg, fg] = map[tone] || map.neutral;
      return (
        <span style={{
          display: "inline-flex", alignItems: "center", gap: 6, background: bg, color: fg,
          fontSize: size === "sm" ? 11 : 12, fontWeight: 700, padding: size === "sm" ? "2px 8px" : "4px 10px",
          borderRadius: 999, lineHeight: 1.4, whiteSpace: "nowrap"
        }}>
          {dot && <span style={{ width: 6, height: 6, borderRadius: 999, background: fg }} />}
          {children}
        </span>
      );
    }

    function StockBar({ stock, par }) {
      const state = window.G.stockState(stock, par);
      const pct = Math.min(100, Math.round((stock / Math.max(par, 1)) * 100));
      const color = { ok: "var(--green-500)", low: "var(--amber-500)", critical: "var(--red-500)", out: "var(--red-500)" }[state];
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 120 }}>
          <div style={{ flex: 1, height: 6, background: "var(--surface-2)", borderRadius: 999, overflow: "hidden" }}>
            <div style={{ width: Math.max(pct, stock > 0 ? 6 : 0) + "%", height: "100%", background: color, borderRadius: 999, transition: "width .5s var(--ease)" }} />
          </div>
          <span className="mono tnum" style={{ fontSize: 12, color: "var(--text-2)", minWidth: 28, textAlign: "right" }}>{stock}</span>
        </div>
      );
    }

    function Btn({ children, variant = "primary", size = "md", icon, onClick, full, style, type }) {
      const base = {
        display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
        fontFamily: "var(--font-sans)", fontWeight: 700, cursor: "pointer", border: "1px solid transparent",
        borderRadius: 10, transition: "all .16s var(--ease)", width: full ? "100%" : "auto",
        fontSize: size === "sm" ? 13 : 14, padding: size === "sm" ? "7px 12px" : "11px 18px", whiteSpace: "nowrap",
      };
      const variants = {
        primary: { background: "var(--primary)", color: "white" },
        ghost: { background: "transparent", color: "var(--text)", borderColor: "var(--line)" },
        soft: { background: "var(--surface-2)", color: "var(--text)" },
        danger: { background: "var(--red-500)", color: "white" },
      };
      return (
        <button type={type || "button"} onClick={onClick}
          style={{ ...base, ...variants[variant], ...style }}>
          {icon && <Icon name={icon} size={size === "sm" ? 16 : 18} />}
          {children}
        </button>
      );
    }

    /* ========== SHELL & LOGIN ========== */
    function StaffLogin({ onLogin }) {
      const [email, setEmail] = useState("");
      const [pw, setPw] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const submit = async (e) => {
        e.preventDefault();
        if (!email || !pw) { setError("Please enter your username and password."); return; }
        setLoading(true);
        setError("");
        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password: pw }),
          });
          const data = await res.json();
          if (!res.ok) {
            setError(data.message || data.error || "Invalid username or password.");
            setLoading(false);
            return;
          }
          const { token, user } = data;
          sessionStorage.setItem("staff_token", token);
          sessionStorage.setItem("staff_refresh_token", data.refreshToken || "");
          sessionStorage.setItem("staff_user", JSON.stringify(user));
          window.G.token = token;
          window.G.currentUser = user;
          await initializeAppData();
          const shopId = user.shopId || (window.G.SHOPS[0] && window.G.SHOPS[0].id) || "msn";
          onLogin(shopId, user);
        } catch (err) {
          setError("Cannot connect to server. Check the backend is running.");
          setLoading(false);
        }
      };

      const fieldStyle = { width: "100%", padding: "12px 14px", borderRadius: 11, border: "1px solid var(--line)", background: "var(--surface)", color: "var(--text)", fontSize: 15, fontFamily: "var(--font-sans)", outline: "none", boxSizing: "border-box" };

      return (
        <div style={{ minHeight: "100vh", display: "grid", placeItems: "center", background: "var(--bg)", padding: 40 }}>
          <div style={{ width: "100%", maxWidth: 392, background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 20, padding: "38px 36px", boxShadow: "var(--shadow-lg)" }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 26 }}><Logo size={30} /></div>
            <h2 style={{ fontSize: 23, fontWeight: 800, letterSpacing: "-0.02em", margin: "0 0 5px", color: "var(--text)", textAlign: "center" }}>Staff Sign In</h2>
            <p style={{ color: "var(--text-2)", margin: "0 0 26px", fontSize: 14.5, textAlign: "center" }}>Store Operations Console</p>

            {error && (
              <div style={{ marginBottom: 16, padding: "11px 14px", borderRadius: 11, background: "var(--red-100)", color: "var(--red-700)", fontSize: 13.5, fontWeight: 600, border: "1px solid var(--red-300)" }}>
                {error}
              </div>
            )}

            <form onSubmit={submit}>
              <label style={{ display: "block", marginBottom: 16 }}>
                <span style={{ display: "block", fontSize: 13, fontWeight: 600, color: "var(--text-2)", marginBottom: 7 }}>Username (email)</span>
                <input value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" autoComplete="username" style={fieldStyle} />
              </label>
              <label style={{ display: "block", marginBottom: 20 }}>
                <span style={{ display: "block", fontSize: 13, fontWeight: 600, color: "var(--text-2)", marginBottom: 7 }}>Password</span>

    /* ========== FULFILLMENT SCREEN ========== */
    function FulfillScreen({ shopId, setRoute }) {
      const [orders, setOrders] = useState(() => window.G.ORDERS.map(o => ({ ...o })));
      const [selId, setSelId] = useState(window.G.ORDERS.find(o => o.status === "new")?.id || window.G.ORDERS[0].id);
      const [tab, setTab] = useState("active");
      const [picked, setPicked] = useState({});

      const sel = orders.find(o => o.id === selId);
      const lineItems = useMemo(() => {
        if (!sel) return [];
        const start = (sel.id.charCodeAt(4) * 3) % window.G.PRODUCTS.length;
        const n = Math.min(sel.items, 8);
        const arr = [];
        for (let i = 0; i < n; i++) {
          const p = window.G.PRODUCTS[(start + i * 4) % window.G.PRODUCTS.length];
          arr.push({ ...p, qty: 1 + ((p.id.charCodeAt(2) + i) % 3), aisle: ["A2", "A5", "B1", "B4", "C3", "D2", "Freezer"][i % 7] });
        }
        return arr;
      }, [selId]);

      const counts = {
        new: orders.filter(o => o.status === "new").length,
        picking: orders.filter(o => o.status === "picking").length,
        ready: orders.filter(o => o.status === "ready").length,
        completed: orders.filter(o => o.status === "completed").length,
      };

      const visible = orders.filter(o => tab === "active" ? o.status !== "completed" : o.status === "completed");
      const setStatus = (id, status, picker) => setOrders(os => os.map(o => o.id === id ? { ...o, status, picker: picker ?? o.picker } : o));
      const togglePick = (idx) => setPicked(p => ({ ...p, [selId]: { ...(p[selId] || {}), [idx]: !(p[selId]?.[idx]) } }));

      const pickedCount = lineItems.filter((_, i) => picked[selId]?.[i]).length;
      const allPicked = pickedCount === lineItems.length && lineItems.length > 0;

      return (
        <React.Fragment>
          <PageHead title="Fulfillment queue" subtitle={`${counts.new} new · ${counts.picking} picking · ${counts.ready} ready`} />

          <div style={{ flex: 1, display: "grid", gridTemplateColumns: "minmax(380px, 1fr) 1.1fr", gap: 22, padding: "22px 34px 48px", alignItems: "start", maxWidth: "100%", width: "100%", overflowY: "auto" }}>
            <section style={{ ...card(), padding: 0, overflow: "hidden" }}>
              <div style={{ display: "flex", padding: 6, gap: 4, borderBottom: "1px solid var(--line)" }}>
                {[["active", "Active"], ["completed", "Completed"]].map(([k, l]) => (
                  <button key={k} onClick={() => setTab(k)} style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", cursor: "pointer", background: tab === k ? "var(--surface-2)" : "transparent", color: "var(--text)", fontWeight: 700, fontSize: 13.5, fontFamily: "var(--font-sans)" }}>
                    {l}
                  </button>
                ))}
              </div>
              <div style={{ maxHeight: 620, overflowY: "auto" }}>
                {visible.map(o => {
                  const active = o.id === selId;
                  const statusTone = o.status === "new" ? "info" : o.status === "ready" ? "ok" : "low";
                  return (
                    <button key={o.id} onClick={() => setSelId(o.id)} style={{ width: "100%", textAlign: "left", display: "flex", gap: 13, padding: "15px 18px", borderTop: "1px solid var(--line)", border: "none", borderLeft: active ? "3px solid var(--primary)" : "3px solid transparent", background: active ? "var(--surface-2)" : "transparent", cursor: "pointer", alignItems: "center" }}>
                      <div style={{ width: 42, height: 42, borderRadius: 999, background: active ? "var(--green-600)" : "var(--surface-2)", color: active ? "#fff" : "var(--text-2)", display: "grid", placeItems: "center", fontWeight: 700, fontSize: 13.5, flexShrink: 0 }}>{o.initials}</div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 700, fontSize: 14.5, color: "var(--text)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{o.customer}</div>
                        <div style={{ fontSize: 12.5, color: "var(--text-2)", marginTop: 2 }}><span className="mono" style={{ color: "var(--text-3)" }}>{o.id}</span> · {o.items} items</div>
                      </div>
                      <Pill tone={statusTone} size="sm">{o.status.charAt(0).toUpperCase() + o.status.slice(1)}</Pill>
                    </button>
                  );
                })}
              </div>
            </section>

            {sel && (
              <section style={{ ...card(), padding: 0, overflow: "hidden", position: "sticky", top: 92 }}>
                <div style={{ padding: "20px 24px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ width: 48, height: 48, borderRadius: 999, background: "var(--green-600)", color: "#fff", display: "grid", placeItems: "center", fontWeight: 700, fontSize: 16, flexShrink: 0 }}>{sel.initials}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <h2 style={{ fontSize: 18, fontWeight: 800, margin: 0, color: "var(--text)" }}>{sel.customer}</h2>
                    <p style={{ fontSize: 13, color: "var(--text-2)", margin: "3px 0 0" }}><span className="mono">{sel.id}</span> · {window.G.money(sel.total)}</p>
                  </div>
                </div>

                {sel.status === "picking" && (
                  <div style={{ padding: "12px 24px", display: "flex", alignItems: "center", gap: 12, background: "var(--bg)", borderBottom: "1px solid var(--line)" }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "var(--text)" }}>Progress</span>
                    <div style={{ flex: 1, height: 7, background: "var(--surface-2)", borderRadius: 999, overflow: "hidden" }}>
                      <div style={{ width: (pickedCount / lineItems.length * 100) + "%", height: "100%", background: "var(--primary)", transition: "width .35s var(--ease)" }} />
                    </div>
                    <span className="tnum" style={{ fontSize: 13, fontWeight: 700, color: "var(--text-2)" }}>{pickedCount}/{lineItems.length}</span>
                  </div>
                )}

                <div style={{ maxHeight: 360, overflowY: "auto" }}>
                  {lineItems.map((it, idx) => {
                    const isPicked = picked[selId]?.[idx];
                    const canPick = sel.status === "picking";
                    return (
                      <div key={idx} style={{ display: "flex", alignItems: "center", gap: 13, padding: "12px 24px", borderTop: idx ? "1px solid var(--line)" : "none", opacity: isPicked ? 0.6 : 1 }}>
                        <button onClick={() => canPick && togglePick(idx)} disabled={!canPick} style={{ width: 24, height: 24, borderRadius: 7, border: "2px solid", borderColor: isPicked ? "var(--primary)" : "var(--line)", background: isPicked ? "var(--primary)" : "transparent", color: "#fff", cursor: canPick ? "pointer" : "not-allowed", display: "grid", placeItems: "center", flexShrink: 0 }}>
                          {isPicked && <Icon name="check" size={14} stroke={3} />}
                        </button>
                        <ProductSwatch p={it} size={38} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 600, fontSize: 13.5, color: "var(--text)", textDecoration: isPicked ? "line-through" : "none" }}>{it.name}</div>
                          <div style={{ fontSize: 12, color: "var(--text-3)" }}>{window.G.catOf(it.cat).name} · {window.G.money(it.price)}/{it.unit}</div>
                        </div>
                        <span style={{ fontSize: 11.5, fontWeight: 700, color: "var(--text-2)", background: "var(--surface-2)", padding: "3px 9px", borderRadius: 7 }}>Aisle {it.aisle}</span>
                        <span className="tnum" style={{ fontSize: 14, fontWeight: 800, color: "var(--text)", minWidth: 28, textAlign: "right" }}>×{it.qty}</span>
                      </div>
                    );
                  })}
                </div>

                <div style={{ padding: "16px 24px", borderTop: "1px solid var(--line)", background: "var(--bg)", display: "flex", gap: 12, alignItems: "center" }}>
                  {sel.status === "new" && <><span style={{ flex: 1, fontSize: 13, color: "var(--text-2)" }}>Ready to pick</span><Btn icon="clipboard" onClick={() => setStatus(sel.id, "picking", "Alex")}>Start picking</Btn></>}
                  {sel.status === "picking" && <><span style={{ flex: 1, fontSize: 13, color: allPicked ? "var(--primary)" : "var(--text-2)" }}>{allPicked ? "All picked!" : `${lineItems.length - pickedCount} left`}</span><Btn icon="check" onClick={() => setStatus(sel.id, "ready")} style={{ opacity: allPicked ? 1 : 0.5 }}>Mark ready</Btn></>}
                  {sel.status === "ready" && <><span style={{ flex: 1, fontSize: 13, color: "var(--text-2)" }}>Hand off to driver</span><Btn icon="check" onClick={() => setStatus(sel.id, "completed")}>Dispatch</Btn></>}
                </div>
              </section>
            )}
          </div>
        </React.Fragment>
      );
    }

    /* ========== RECEIVE SCREEN ========== */
    function ReceiveScreen({ shopId, setRoute }) {
      const [poId, setPoId] = useState("PO-2206");
      const po = window.G.DELIVERIES.find(d => d.id === poId);
      const sup = window.G.supplierOf(po.supplier);

      const lines = useMemo(() => {
        const items = window.G.PRODUCTS.filter(p => p.supplier === po.supplier).slice(0, po.items);
        return items.map(p => ({ ...p, stock: window.G.shopStock(p.id, shopId), expected: 6 + ((p.id.charCodeAt(2) * 3) % 18) }));
      }, [poId, shopId]);

      const [recv, setRecv] = useState({});
      const [done, setDone] = useState({});
      const [success, setSuccess] = useState(false);

      const checkedCount = lines.filter(l => done[l.id]).length;
      const progress = Math.round((checkedCount / lines.length) * 100);

      if (success) return (
        <div style={{ display: "grid", placeItems: "center", padding: 40, minHeight: "calc(100vh - 60px)" }}>
          <div style={{ ...card(), maxWidth: 460, width: "100%", textAlign: "center", padding: 40 }}>
            <div style={{ width: 76, height: 76, borderRadius: 999, background: "var(--green-100)", color: "var(--green-700)", display: "grid", placeItems: "center", margin: "0 auto 22px" }}>
              <Icon name="check" size={40} stroke={3} />
            </div>
            <h2 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 8px", color: "var(--text)" }}>Stock received</h2>
            <p style={{ color: "var(--text-2)", margin: "0 0 24px", fontSize: 15 }}>
              <span className="mono">{po.id}</span> from {sup.name} is checked in.
            </p>
            <div style={{ display: "flex", gap: 12 }}>
              <Btn variant="ghost" full onClick={() => { setSuccess(false); setRecv({}); setDone({}); }}>Receive another</Btn>
              <Btn full icon="dashboard" onClick={() => setRoute("dashboard")}>Dashboard</Btn>
            </div>
          </div>
        </div>
      );

      return (
        <React.Fragment>
          <PageHead title="Receive stock" subtitle="Check in supplier delivery" />
          <div style={{ flex: 1, display: "grid", gridTemplateColumns: "300px 1fr", gap: 22, padding: "22px 34px 48px", maxWidth: "100%", width: "100%", overflowY: "auto" }}>
            <aside style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--text-3)" }}>Incoming POs</div>
              {window.G.DELIVERIES.map(d => {
                const active = d.id === poId;
                return (
                  <button key={d.id} onClick={() => setPoId(d.id)} style={{ textAlign: "left", padding: 15, borderRadius: 14, border: "1px solid", borderColor: active ? "var(--primary)" : "var(--line)", background: active ? "var(--surface)" : "var(--bg)", cursor: "pointer", boxShadow: active ? "var(--shadow-md)" : "none" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <span className="mono" style={{ fontSize: 12, fontWeight: 700, color: "var(--text)" }}>{d.id}</span>
                      <Pill tone={d.status === "arrived" ? "ok" : "info"} size="sm">{d.status === "arrived" ? "Arrived" : "In transit"}</Pill>
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text)" }}>{window.G.supplierOf(d.supplier).name}</div>
                    <div style={{ fontSize: 12, color: "var(--text-2)", marginTop: 2 }}>{d.items} lines</div>
                  </button>
                );
              })}
            </aside>

            <section style={{ ...card(), padding: 0, overflow: "hidden" }}>
              <div style={{ padding: "20px 24px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 16 }}>
                <span style={{ width: 48, height: 48, borderRadius: 13, background: "var(--green-100)", color: "var(--green-700)", display: "grid", placeItems: "center", flexShrink: 0 }}><Icon name="truck" size={24} /></span>
                <div style={{ flex: 1 }}>
                  <h2 style={{ fontSize: 18, fontWeight: 800, margin: 0, color: "var(--text)" }}>{sup.name}</h2>
                  <p style={{ fontSize: 13, color: "var(--text-2)", margin: "2px 0 0" }}><span className="mono">{po.id}</span> · {po.eta}</p>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div className="tnum" style={{ fontSize: 22, fontWeight: 800, color: "var(--text)" }}>{checkedCount}<span style={{ color: "var(--text-3)", fontWeight: 600 }}>/{lines.length}</span></div>
                  <div style={{ fontSize: 12, color: "var(--text-3)" }}>lines received</div>
                </div>
              </div>
              <div style={{ height: 4, background: "var(--surface-2)" }}><div style={{ width: progress + "%", height: "100%", background: "var(--primary)", transition: "width .4s var(--ease)" }} /></div>

              <div style={{ maxHeight: 430, overflowY: "auto" }}>
                {lines.map(l => {
                  const checked = !!done[l.id];
                  return (
                    <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "13px 24px", borderTop: "1px solid var(--line)", background: checked ? "color-mix(in oklch, var(--green-500) 7%, transparent)" : "transparent" }}>
                      <button onClick={() => setDone(d => ({ ...d, [l.id]: !d[l.id] }))} style={{ width: 26, height: 26, borderRadius: 8, border: "2px solid", borderColor: checked ? "var(--primary)" : "var(--line)", background: checked ? "var(--primary)" : "transparent", color: "#fff", cursor: "pointer", display: "grid", placeItems: "center", flexShrink: 0 }}>
                        {checked && <Icon name="check" size={16} stroke={3} />}
                      </button>
                      <ProductSwatch p={l} size={40} />
                      <div style={{ flex: 1, minWidth: 0, lineHeight: 1.3 }}>
                        <div style={{ fontWeight: 700, fontSize: 14, color: "var(--text)" }}>{l.name}</div>
                        <div style={{ fontSize: 12, color: "var(--text-3)" }}><span className="mono">{l.id.toUpperCase()}</span> · on hand {l.stock}</div>
                      </div>
                      {checked ? <Icon name="check" size={16} style={{ color: "var(--primary)" }} /> : <span style={{ fontSize: 12, color: "var(--text-3)" }}>—</span>}
                    </div>
                  );
                })}
              </div>

              <div style={{ padding: "16px 24px", borderTop: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 16, background: "var(--bg)" }}>
                <span style={{ flex: 1, fontSize: 13, color: "var(--text-2)" }}>{checkedCount} of {lines.length} items checked</span>
                <Btn variant="ghost" onClick={() => { setRecv({}); setDone({}); }}>Reset</Btn>
                <Btn icon="check" onClick={() => setSuccess(true)} style={{ opacity: checkedCount ? 1 : 0.5 }}>Confirm & add</Btn>
              </div>
            </section>
          </div>
        </React.Fragment>
      );
    }

    /* ========== TRANSFER SCREEN ========== */
    function TransferScreen({ shopId, setRoute }) {
      const [from, setFrom] = useState(shopId);
      const [to, setTo] = useState(() => {
        const other = window.G.SHOPS.find(s => s.id !== shopId);
        return other ? other.id : (window.G.SHOPS[0] ? window.G.SHOPS[0].id : shopId);
      });
      const [cart, setCart] = useState({});
      const [q, setQ] = useState("");
      const [success, setSuccess] = useState(false);

      const fromShop = window.G.SHOPS.find(s => s.id === from);
      const toShop = window.G.SHOPS.find(s => s.id === to);

      const products = useMemo(() => window.G.PRODUCTS
        .map(p => ({ ...p, fromStock: window.G.shopStock(p.id, from), toStock: window.G.shopStock(p.id, to) }))
        .filter(p => p.name.toLowerCase().includes(q.toLowerCase())), [from, to, q]);

      const lines = Object.entries(cart).filter(([, v]) => v > 0);
      const totalUnits = lines.reduce((s, [, v]) => s + v, 0);

      if (success) return (
        <div style={{ display: "grid", placeItems: "center", padding: 40, minHeight: "calc(100vh - 60px)" }}>
          <div style={{ ...card(), maxWidth: 460, width: "100%", textAlign: "center", padding: 40 }}>
            <div style={{ width: 76, height: 76, borderRadius: 999, background: "var(--green-100)", color: "var(--green-700)", display: "grid", placeItems: "center", margin: "0 auto 22px" }}>
              <Icon name="transfer" size={36} stroke={2.4} />
            </div>
            <h2 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 8px", color: "var(--text)" }}>Transfer submitted</h2>
            <p style={{ color: "var(--text-2)", margin: "0 0 24px", fontSize: 15 }}>
              {totalUnits} units from {fromShop.name} to {toShop.name} are en route.
            </p>
            <div style={{ display: "flex", gap: 12 }}>
              <Btn variant="ghost" full onClick={() => { setSuccess(false); setCart({}); }}>New transfer</Btn>
              <Btn full icon="dashboard" onClick={() => setRoute("dashboard")}>Dashboard</Btn>
            </div>
          </div>
        </div>
      );

      return (
        <React.Fragment>
          <PageHead title="Stock transfer" subtitle="Move inventory between locations" />
          <div style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 360px", gap: 22, padding: "22px 34px 48px", alignItems: "start", maxWidth: "100%", width: "100%", overflowY: "auto" }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              <div style={{ ...card(), display: "flex", alignItems: "center", gap: 16 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-3)", marginBottom: 6, textTransform: "uppercase" }}>From</div>
                  <select value={from} onChange={e => { setFrom(e.target.value); setCart({}); }} style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: "1px solid var(--line)", background: "var(--surface)", color: "var(--text)", fontSize: 14.5, fontWeight: 700, appearance: "none", cursor: "pointer", fontFamily: "var(--font-sans)", outline: "none" }}>
                    {window.G.SHOPS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
                <button onClick={() => { setFrom(to); setTo(from); setCart({}); }} title="Swap" style={{ width: 42, height: 42, borderRadius: 999, border: "1px solid var(--line)", background: "var(--surface-2)", color: "var(--text-2)", cursor: "pointer", display: "grid", placeItems: "center", flexShrink: 0, marginTop: 18 }}>
                  <Icon name="transfer" size={18} />
                </button>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-3)", marginBottom: 6, textTransform: "uppercase" }}>To</div>
                  <select value={to} onChange={e => setTo(e.target.value)} style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: "1px solid var(--line)", background: "var(--surface)", color: "var(--text)", fontSize: 14.5, fontWeight: 700, appearance: "none", cursor: "pointer", fontFamily: "var(--font-sans)", outline: "none" }}>
                    {window.G.SHOPS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
              </div>

              <section style={{ ...card(), padding: 0, overflow: "hidden" }}>
                <div style={{ padding: "16px 20px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ flex: 1 }}><h2 style={sectionTitle}>Select products</h2></div>
                  <div style={{ position: "relative" }}>
                    <span style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: "var(--text-3)" }}><Icon name="search" size={16} /></span>
                    <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search…" style={{ padding: "8px 12px 8px 34px", borderRadius: 9, border: "1px solid var(--line)", background: "var(--bg)", color: "var(--text)", fontSize: 13, width: 170, outline: "none", fontFamily: "var(--font-sans)" }} />
                  </div>
                </div>
                <div style={{ maxHeight: 440, overflowY: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <thead style={{ position: "sticky", top: 0, background: "var(--surface)", zIndex: 1 }}>
                      <tr>
                        <th style={th}>Product</th>
                        <th style={{ ...th, textAlign: "center" }}>{fromShop.code}</th>
                        <th style={{ ...th, textAlign: "center" }}>{toShop.code}</th>
                        <th style={{ ...th, textAlign: "right" }}>Qty</th>
                      </tr>
                    </thead>
                    <tbody>
                      {products.map(p => {
                        const inCart = cart[p.id] || 0;
                        return (
                          <tr key={p.id} style={{ borderTop: "1px solid var(--line)", background: inCart ? "color-mix(in oklch, var(--green-500) 6%, transparent)" : "transparent" }}>
                            <td style={td}>
                              <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
                                <ProductSwatch p={p} size={34} />
                                <div>
                                  <div style={{ fontWeight: 600, fontSize: 13.5, color: "var(--text)" }}>{p.name}</div>
                                  <div style={{ fontSize: 11.5, color: "var(--text-3)" }}>{window.G.catOf(p.cat).name}</div>
                                </div>
                              </div>
                            </td>
                            <td style={{ ...td, textAlign: "center" }}><span className="tnum" style={{ fontWeight: 700, fontSize: 13.5, color: "var(--text)" }}>{p.fromStock}</span></td>
                            <td style={{ ...td, textAlign: "center" }}>
                              <Pill tone={window.G.stockState(p.toStock, p.par)} size="sm">{p.toStock}</Pill>
                            </td>
                            <td style={{ ...td, textAlign: "right" }}>
                              {inCart > 0
                                ? <input type="number" value={inCart} onChange={e => { const v = parseInt(e.target.value) || 0; setCart(c => ({ ...c, [p.id]: Math.max(0, Math.min(v, p.fromStock)) })); }} style={{ width: 50, padding: "4px 8px", borderRadius: 6, border: "1px solid var(--line)", background: "var(--surface)", color: "var(--text)", textAlign: "center", fontFamily: "var(--font-sans)" }} />
                                : <Btn size="sm" variant="soft" icon="plus" onClick={() => setCart(c => ({ ...c, [p.id]: 1 }))}>Add</Btn>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </section>
            </div>

            <aside style={{ ...card(), padding: 0, position: "sticky", top: 92, overflow: "hidden" }}>
              <div style={{ padding: "18px 20px", borderBottom: "1px solid var(--line)" }}>
                <h2 style={sectionTitle}>Manifest</h2>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, fontSize: 13 }}>
                  <span style={{ fontWeight: 700, color: "var(--text)", whiteSpace: "nowrap" }}>{fromShop.name}</span>
                  <Icon name="chevR" size={14} style={{ color: "var(--text-3)" }} />
                  <span style={{ fontWeight: 700, color: "var(--primary)", whiteSpace: "nowrap" }}>{toShop.name}</span>
                </div>
              </div>
              <div style={{ maxHeight: 340, overflowY: "auto" }}>
                {lines.length === 0
                  ? <div style={{ padding: "44px 20px", textAlign: "center", color: "var(--text-3)" }}>
                      <Icon name="box" size={30} style={{ opacity: 0.5 }} />
                      <p style={{ fontSize: 13.5, margin: "10px 0 0" }}>No items added</p>
                    </div>
                  : lines.map(([id, qty]) => {
                    const p = window.G.PRODUCTS.find(x => x.id === id);
                    return (
                      <div key={id} style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 20px", borderTop: "1px solid var(--line)" }}>
                        <ProductSwatch p={p} size={32} />
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{p.name}</div>
                          <div className="tnum" style={{ fontSize: 12, color: "var(--text-3)" }}>{qty} {p.unit}</div>
                        </div>
                        <button onClick={() => setCart(c => { const n = { ...c }; delete n[id]; return n; })} style={{ background: "none", border: "none", color: "var(--text-3)", cursor: "pointer", padding: 4 }}><Icon name="x" size={16} /></button>
                      </div>
                    );
                  })}
              </div>
              <div style={{ padding: 20, borderTop: "1px solid var(--line)", background: "var(--bg)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
                  <span style={{ fontSize: 14, color: "var(--text-2)" }}>{lines.length} products · {totalUnits} units</span>
                </div>
                <Btn full icon="transfer" onClick={() => setSuccess(true)} style={{ opacity: lines.length ? 1 : 0.5, pointerEvents: lines.length ? "auto" : "none" }}>Submit transfer</Btn>
              </div>
            </aside>
          </div>
        </React.Fragment>
      );
    }

    /* ========== ADMIN MANAGEMENT SCREENS ========== */

        <React.Fragment>
          <PageHead title={title} subtitle={subtitle}>
            {action}
          </PageHead>
          <div style={{ flex: 1, padding: "22px 34px 48px", overflowY: "auto" }}>{children}</div>
        </React.Fragment>

      if (!open) return null;
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "grid", placeItems: "center", padding: 20 }} onClick={onClose}>
          <div style={{ background: "var(--surface)", borderRadius: 16, padding: 28, width: "100%", maxWidth: 460, border: "1px solid var(--line)", boxShadow: "var(--shadow-lg)", maxHeight: "90vh", overflowY: "auto" }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 22 }}>
              <h2 style={{ fontSize: 18, fontWeight: 800, margin: 0, color: "var(--text)" }}>{title}</h2>
              <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", color: "var(--text-3)", lineHeight: 1 }}>×</button>

            {children}
          </div>
        </div>
      );

    function FieldRow({ label, children }) {
      return (
        <label style={{ display: "block", marginBottom: 14 }}>
          <span style={{ display: "block", fontSize: 12, fontWeight: 600, color: "var(--text-2)", marginBottom: 6 }}>{label}</span>
          {children}
        </label>
      );
    }

    const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 9, border: "1px solid var(--line)", background: "var(--bg)", color: "var(--text)", fontSize: 14, fontFamily: "var(--font-sans)", outline: "none", boxSizing: "border-box" };

    function MgmtTable({ cols, rows, onEdit, onDelete, extraAction }) {
      return (
        <div style={{ ...card(), padding: 0, overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: "var(--surface-2)" }}>
                {cols.map(c => <th key={c} style={{ ...th, fontWeight: 700 }}>{c}</th>)}
                <th style={{ ...th, textAlign: "right" }}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {rows.length === 0 ? (
                <tr><td colSpan={cols.length + 1} style={{ ...td, textAlign: "center", color: "var(--text-3)", padding: 32 }}>No records yet</td></tr>
              ) : rows.map(r => (
                <tr key={r.id} style={{ borderTop: "1px solid var(--line)" }}
                  onMouseEnter={e => e.currentTarget.style.background = "var(--surface-2)"}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  {r.cells.map((c, i) => <td key={i} style={td}>{c}</td>)}
                  <td style={{ ...td, textAlign: "right" }}>
                    <div style={{ display: "flex", gap: 6, justifyContent: "flex-end" }}>
                      {extraAction && extraAction(r.raw)}
                      <Btn size="sm" variant="soft" icon="edit" onClick={() => onEdit(r.raw)}>Edit</Btn>
                      <Btn size="sm" variant="danger" icon="trash" onClick={() => onDelete(r.raw)}>Delete</Btn>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ---- Manage Shops ---- */
    function ManageShopsScreen() {
      const [shops, setShops] = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal, setModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [form, setForm] = useState({ id: "", name: "", city: "", code: "", hours: "" });
      const [err, setErr] = useState("");
      const [imageFile, setImageFile] = useState(null);
      const [imagePreview, setImagePreview] = useState(null);
      const [currentImage, setCurrentImage] = useState(null);
      const [uploading, setUploading] = useState(false);
      const fileInputRef = useRef(null);

      const load = async () => {
        setLoading(true);
        try {
          const r = await fetch(`${API_BASE}/shops`, { headers: authHeaders() });
          if (r.ok) setShops(await r.json());
        } finally { setLoading(false); }
      };

      useEffect(() => { load(); }, []);

      const openCreate = () => {
        setEditing(null);
        setForm({ id: "", name: "", city: "", code: "", hours: "" });
        setImageFile(null); setImagePreview(null); setCurrentImage(null);
        setErr(""); setModal(true);
      };

      const openEdit = s => {
        setEditing(s.id);
        setForm({ id: s.id, name: s.name, city: s.city, code: s.code, hours: s.hours || "" });
        setImageFile(null); setImagePreview(null);
        setCurrentImage(s.image ? `http://localhost:3000${s.image}` : null);
        setErr(""); setModal(true);
      };

      const handleImageChange = e => {
        const file = e.target.files[0];
        if (!file) return;
        setImageFile(file);
        const reader = new FileReader();
        reader.onload = ev => setImagePreview(ev.target.result);
        reader.readAsDataURL(file);
      };

      const clearNewImage = () => {
        setImageFile(null); setImagePreview(null);
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      const removeCurrentImage = async () => {
        if (!editing) return;
        const r = await fetch(`${API_BASE}/shops/${editing}/image`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${window.G.token}` },
        });
        if (r.ok) { setCurrentImage(null); load(); }
        else setErr("Failed to remove image");
      };

      const save = async e => {
        e.preventDefault(); setErr("");
        const url = editing ? `${API_BASE}/shops/${editing}` : `${API_BASE}/shops`;
        const body = editing ? { name: form.name, city: form.city, code: form.code, hours: form.hours } : form;
        const r = await apiFetch(url, { method: editing ? "PUT" : "POST", body: JSON.stringify(body) });
        if (!r || !r.ok) { const d = r ? await r.json() : {}; setErr(d.message || d.error || "Save failed"); return; }
        const saved = await r.json();
        const shopId = editing || saved.id;

        if (imageFile && shopId) {
          setUploading(true);
          const fd = new FormData();
          fd.append("image", imageFile);
          const ir = await apiFetch(`${API_BASE}/shops/${shopId}/image`, { method: "POST", body: fd });
          setUploading(false);
          if (!ir || !ir.ok) { setErr("Shop saved but image upload failed"); load(); return; }
        }

        setModal(false); load(); window.G.SHOPS = []; initializeAppData();
      };

      const del = async s => {
        if (!confirm(`Delete shop "${s.name}"?`)) return;
        const r = await fetch(`${API_BASE}/shops/${s.id}`, { method: "DELETE", headers: authHeaders() });
        if (r.ok) load(); else alert("Delete failed");
      };

      const displayPreview = imagePreview || currentImage;

      return (
        <AdminPageWrap title="Manage Shops" subtitle={`${shops.length} locations`} action={<Btn size="sm" icon="plus" onClick={openCreate}>Add Shop</Btn>}>
          {loading ? <div style={{ color: "var(--text-3)", padding: 32, textAlign: "center" }}>Loading…</div> : (
            <MgmtTable
              cols={["Image", "Name", "Code", "City", "Hours"]}
              rows={shops.map(s => ({ id: s.id, raw: s, cells: [
                s.image
                  ? React.createElement("img", { src: `http://localhost:3000${s.image}`, alt: s.name, style: { width: 40, height: 40, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)" } })
                  : React.createElement("div", { style: { width: 40, height: 40, borderRadius: 8, background: "var(--surface-2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 } }, "🏪"),
                s.name,
                React.createElement("span", { className: "mono", style: { fontSize: 12 } }, s.code),
                s.city,
                s.hours || "—",
              ]}))}
              onEdit={openEdit} onDelete={del}
            />
          )}
          <MgmtModal open={modal} title={editing ? "Edit Shop" : "Add Shop"} onClose={() => setModal(false)}>
            <form onSubmit={save}>
              {!editing && <FieldRow label="Shop ID (short code, e.g. msn)"><input style={inputStyle} value={form.id} onChange={e => setForm({ ...form, id: e.target.value.toLowerCase() })} required placeholder="msn" /></FieldRow>}
              <FieldRow label="Name *"><input style={inputStyle} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} required placeholder="Mission District" /></FieldRow>
              <FieldRow label="City *"><input style={inputStyle} value={form.city} onChange={e => setForm({ ...form, city: e.target.value })} required placeholder="San Francisco" /></FieldRow>
              <FieldRow label="Code *"><input style={inputStyle} value={form.code} onChange={e => setForm({ ...form, code: e.target.value.toUpperCase() })} required placeholder="MSN" /></FieldRow>
              <FieldRow label="Hours"><input style={inputStyle} value={form.hours} onChange={e => setForm({ ...form, hours: e.target.value })} placeholder="9am–9pm" /></FieldRow>

              <FieldRow label="Shop Image">
                <div>
                  {displayPreview && (
                    <div style={{ position: "relative", marginBottom: 8 }}>
                      <img src={displayPreview} alt="preview" style={{ width: "100%", maxHeight: 160, objectFit: "cover", borderRadius: 8, border: "1px solid var(--line)", display: "block" }} />
                      <button type="button" onClick={imagePreview ? clearNewImage : removeCurrentImage}
                        style={{ position: "absolute", top: 6, right: 6, background: "rgba(220,53,69,0.9)", color: "#fff", border: "none", borderRadius: 6, padding: "3px 8px", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>
                        Remove
                      </button>
                      {imagePreview && <div style={{ fontSize: 11, color: "var(--text-3)", marginTop: 4 }}>Will upload on save</div>}
                    </div>
                  )}
                  {!imagePreview && (
                    <label style={{ border: "2px dashed var(--line)", borderRadius: 8, padding: "16px", textAlign: "center", cursor: "pointer", color: "var(--text-3)", fontSize: 13, display: "block" }}>
                      <div style={{ fontSize: 24, marginBottom: 4 }}>📷</div>
                      <div style={{ fontWeight: 600 }}>Click to upload image</div>
                      <div style={{ fontSize: 11 }}>Any size — original quality preserved</div>
                      <input type="file" accept="image/*" onChange={handleImageChange} style={{ display: "none" }} />
                    </label>
                  )}
                </div>
              </FieldRow>

              {err && <div style={{ color: "var(--red-500)", fontSize: 13, marginBottom: 12 }}>{err}</div>}
              <div style={{ display: "flex", gap: 10 }}>
                <Btn full type="submit" disabled={uploading}>{uploading ? "Uploading…" : editing ? "Update" : "Create"}</Btn>
                <Btn full variant="ghost" type="button" onClick={() => setModal(false)}>Cancel</Btn>
              </div>
            </form>
          </MgmtModal>
        </AdminPageWrap>
      );
    }

                <span style={{ fontWeight: 600 }}>{s.name}</span>,

          <MgmtModal open={modal} title={editing ? "Edit Staff" : "Add Staff"} onClose={() => setModal(false)}>
            <form onSubmit={save}>
              <FieldRow label="Name *"><input style={inputStyle} value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} required /></FieldRow>
              {!editing && <FieldRow label="Email *"><input style={inputStyle} type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} required /></FieldRow>}
              {!editing && <FieldRow label="Password *"><input style={inputStyle} type="password" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} required /></FieldRow>}

                <select style={{ ...inputStyle, appearance: "none" }} value={form.shopId} onChange={e => setForm({ ...form, shopId: e.target.value })} required>

                <Btn full variant="ghost" type="button" onClick={() => setModal(false)}>Cancel</Btn>

                <div style={{ background: "var(--surface-2)", borderRadius: 10, padding: 16, marginBottom: 20 }}>

                  <div className="mono" style={{ fontSize: 20, fontWeight: 800, color: "var(--text)" }}>{resetInfo.temporaryPassword}</div>
                  <div style={{ fontSize: 12, color: "var(--text-3)", marginTop: 6 }}>Share this securely with {resetInfo.email}</div>
                </div>
                <Btn full onClick={() => setResetInfo(null)}>Done</Btn>
              </div>
            )}
          </MgmtModal>
        </AdminPageWrap>
      );
