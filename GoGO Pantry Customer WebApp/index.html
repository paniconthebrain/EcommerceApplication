            </div>
          </div>
          {/* CATEGORY TABS — sticky below the header */}
          <div style={{ background: "var(--surface)", borderBottom: "1px solid var(--line)", position: "sticky", top: 64, zIndex: 30, display: "flex", gap: 8, overflowX: "auto", padding: "10px 16px", scrollBehavior: "smooth" }}>
            <button onClick={() => { setCat("all"); setSearch(""); }} style={{ padding: "8px 14px", borderRadius: 999, border: "1px solid", borderColor: cat === "all" ? "transparent" : "var(--line)", background: cat === "all" ? "var(--primary)" : "transparent", color: cat === "all" ? "var(--primary-ink)" : "var(--text-2)", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "var(--font-sans)", transition: "all 0.15s" }}>
              All
            </button>
            {G.CATEGORIES.map(c => {
              const active = cat === c.id;
              const bg = active ? `hsl(${c.hue}, 60%, 42%)` : "transparent";
              const border = active ? "transparent" : "var(--line)";
              const color = active ? "#fff" : "var(--text-2)";
              return (
                <button key={c.id} onClick={() => { setCat(c.id); setSearch(""); }} style={{ padding: "8px 14px", borderRadius: 999, border: "1px solid", borderColor: border, background: bg, color, fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "var(--font-sans)", transition: "all 0.15s" }}>
                  {c.name}
                </button>
              );
            })}
          </div>

          {/* CATEGORY HERO */}
          <div style={{ background: `linear-gradient(135deg, oklch(0.38 0.12 ${currentCat.hue}) 0%, oklch(0.5 0.1 ${currentCat.hue}) 100%)`, color: "#fff", padding: "20px 20px", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", right: -20, top: -20, fontSize: "7rem", opacity: 0.1, userSelect: "none", lineHeight: 1 }}>🛒</div>
            <div style={{ maxWidth: 1600, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, position: "relative", zIndex: 1 }}>
              <div>
                <p style={{ margin: "0 0 4px", fontSize: 20, fontWeight: 900, letterSpacing: "-0.02em" }}>{currentCat.name}</p>
                {currentCat.blurb && <p style={{ margin: 0, fontSize: 13, opacity: 0.8 }}>{currentCat.blurb}</p>}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,0.15)", padding: "6px 14px", borderRadius: 999, fontSize: 12, fontWeight: 700, whiteSpace: "nowrap", backdropFilter: "blur(4px)" }}>
                <IconC name="box" size={14} />
                {products.length} product{products.length !== 1 ? "s" : ""}
              </div>
            </div>
          </div>

          {/* MAIN CONTENT */}
          <div style={{ flex: 1, display: "flex", gap: 20, padding: "20px 16px", maxWidth: 1600, margin: "0 auto", width: "100%" }}>
            {/* SIDEBAR */}
            <div className="sidebar-desktop" style={{ minWidth: 280 }}>
              <FilterSidebar priceRange={priceRange} onPriceChange={setPriceRange} showInStockOnly={showInStockOnly} onStockToggle={setShowInStockOnly} showOnSaleOnly={showOnSaleOnly} onSaleToggle={setShowOnSaleOnly} resetFilters={resetFilters} />
              {currentShop && (
                <div style={{ marginTop: 20 }}>
                  <ShopInfoCard shop={currentShop} onChangeShop={() => {}} />
                </div>
              )}
            </div>

            {/* PRODUCTS */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, color: "var(--text-2)", fontWeight: 600 }}>
                  {products.length === G.productsByCat(cat).length
                    ? <>{products.length} product{products.length !== 1 ? "s" : ""}</>
                    : <><span style={{ color: "var(--text)", fontWeight: 800 }}>{products.length}</span> of {G.productsByCat(cat).length} products</>
                  }
                </span>
                {products.length < G.productsByCat(cat).length && (
                  <span style={{ fontSize: 11, color: "var(--primary)", fontWeight: 700, background: "oklch(0.96 0.04 152)", padding: "3px 10px", borderRadius: 999 }}>Filtered</span>
                )}
              </div>
              {products.length === 0 ? (
                <div style={{ textAlign: "center", padding: "60px 20px", color: "var(--text-3)" }}>
                  <IconC name="search" size={40} style={{ opacity: 0.3, marginBottom: 12 }} />
                  <p style={{ fontSize: 16, fontWeight: 600, margin: 0 }}>No products found</p>
                </div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 16 }}>
                  {products.map(p => {
                    const inCart = cartItems[p.id] || 0;
                    const stockState = G.stockState(p.stock);
                    const disabled = stockState === "out";
                    return (
                      <ProductCardEnhanced key={p.id} product={p} inCart={inCart} disabled={disabled} stockState={stockState} onAdd={() => onAddToCart(p.id)} onAddQty={() => onAddToCart(p.id)} onRemoveQty={() => onUpdateCart && onUpdateCart(p.id, Math.max(0, inCart - 1))} onClick={() => setSelectedProduct(p)} />
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* MOBILE FILTER MODAL */}
          {/* PRODUCT DETAIL MODAL */}
          {selectedProduct && (
            <ProductDetailModal
              product={selectedProduct}
              inCart={cartItems[selectedProduct.id] || 0}
              onClose={() => setSelectedProduct(null)}
              onAdd={() => onAddToCart(selectedProduct.id)}
              onUpdateCart={onUpdateCart}
            />
          )}

          {showFiltersModal && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, top: 0, background: "rgba(0,0,0,0.4)", zIndex: 40, display: "flex", alignItems: "flex-end" }} className="mobile-filter-modal" onClick={() => setShowFiltersModal(false)}>
              <div onClick={e => e.stopPropagation()} style={{ width: "100%", background: "var(--surface)", borderRadius: "16px 16px 0 0", padding: "20px 16px", maxHeight: "80vh", overflowY: "auto", display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <h3 style={{ fontSize: 18, fontWeight: 800, color: "var(--text)", margin: 0 }}>Filters</h3>
                  <button onClick={() => setShowFiltersModal(false)} style={{ background: "none", border: "none", fontSize: 24, color: "var(--text-2)", cursor: "pointer" }}>×</button>
                </div>
                <FilterSidebar priceRange={priceRange} onPriceChange={setPriceRange} showInStockOnly={showInStockOnly} onStockToggle={setShowInStockOnly} showOnSaleOnly={showOnSaleOnly} onSaleToggle={setShowOnSaleOnly} resetFilters={resetFilters} />
                <BtnC full onClick={() => setShowFiltersModal(false)} style={{ marginTop: "auto" }}>Apply Filters</BtnC>
              </div>
            </div>
          )}
        </div>
      );
    }

    // CUSTOMER CART COMPONENT
    function CustomerCart({ shopId, cartItems, onUpdateCart, onCheckout, onContinueShopping }) {
      const [dataVersion, setDataVersion] = useState(() => window.GOGO.PRODUCTS?.length > 0 ? 1 : 0);

      useEffect(() => {
        if (window.GOGO.PRODUCTS?.length > 0) setDataVersion(n => n > 0 ? n : 1);
        const handler = () => setDataVersion(n => n + 1);
        window.addEventListener("dataLoaded", handler);
        return () => window.removeEventListener("dataLoaded", handler);
      }, []);

      const cartProducts = useMemo(() => {
        return Object.entries(cartItems).filter(([, qty]) => qty > 0).map(([id, qty]) => {
          const p = G.PRODUCTS.find(x => String(x.id) === String(id));
          if (!p) return null;
          return { ...p, qty, stock: G.shopStock(p.id, shopId), subtotal: (parseFloat(p.price) || 0) * qty };
        }).filter(Boolean);
      }, [cartItems, shopId, dataVersion]);

      const subtotal = cartProducts.reduce((s, p) => s + p.subtotal, 0);
      const tax = subtotal * 0.08;
      const total = subtotal + tax;
      const isEmpty = cartProducts.length === 0;

      return (
        <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh", background: "var(--bg)" }}>
          <ProgressIndicator currentStep={1} steps={["Store", "Cart", "Checkout", "Confirm"]} />
          <div style={{ padding: "20px 16px", maxWidth: 900, margin: "0 auto", width: "100%", flex: 1 }}>
            <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 20px", color: "var(--text)" }}>Your cart</h1>
            {isEmpty ? (
              <div style={{ textAlign: "center", padding: "80px 20px", color: "var(--text-3)" }}>
                <IconC name="cart" size={48} style={{ opacity: 0.3, marginBottom: 16 }} />
                <p style={{ fontSize: 18, fontWeight: 600, margin: 0 }}>Your cart is empty</p>
                <p style={{ fontSize: 13, margin: "6px 0 0", color: "var(--text-3)" }}>Add some fresh groceries to get started</p>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 340px", gap: 24 }}>
                {/* ITEMS */}
                <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 0, overflow: "hidden" }}>
                  <div style={{ padding: 16, borderBottom: "1px solid var(--line)", fontSize: 15, fontWeight: 700, color: "var(--text)" }}>
                    {cartProducts.length} item{cartProducts.length !== 1 ? 's' : ''}
                  </div>
                  <div>
                    {cartProducts.map((p, i) => (
                      <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", borderTop: i ? "1px solid var(--line)" : "none" }}>
                        <div style={{ width: 70, height: 70, borderRadius: 11, background: `oklch(0.92 0.07 ${G.catOf(p.cat).hue})`, display: "grid", placeItems: "center", flexShrink: 0, fontSize: "1.8rem" }}>🛒</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)", marginBottom: 2 }}>{p.name}</div>
                          <div style={{ fontSize: 12, color: "var(--text-2)" }}>{p.unit} · {G.money(p.price)}</div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <button onClick={() => onUpdateCart(p.id, Math.max(0, p.qty - 1))} style={{ width: 28, height: 28, borderRadius: 7, border: "1px solid var(--line)", background: "transparent", color: "var(--text-2)", cursor: "pointer", fontFamily: "var(--font-sans)" }}>−</button>
                          <span style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", minWidth: 24, textAlign: "center" }}>{p.qty}</span>
                          <button onClick={() => onUpdateCart(p.id, p.qty + 1)} style={{ width: 28, height: 28, borderRadius: 7, border: "1px solid var(--line)", background: "transparent", color: "var(--text-2)", cursor: "pointer", fontFamily: "var(--font-sans)" }}>+</button>
                        </div>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", minWidth: 60, textAlign: "right" }}>{G.money(p.subtotal)}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* SUMMARY */}
                <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 20, height: "fit-content", position: "sticky", top: 80 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16, color: "var(--text)" }}>Order summary</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10, fontSize: 13, marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", color: "var(--text-2)" }}>
                      <span>Subtotal</span>
                      <span>{G.money(subtotal)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", color: "var(--text-2)" }}>
                      <span>Pickup</span>
                      <span style={{ color: "var(--green-600)", fontWeight: 700 }}>Free</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", color: "var(--text-2)" }}>
                      <span>Tax</span>
                      <span>{G.money(tax)}</span>
                    </div>
                  </div>
                  <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginBottom: 18, display: "flex", justifyContent: "space-between" }}>
                    <span style={{ fontWeight: 700, color: "var(--text)" }}>Total</span>
                    <span style={{ fontSize: 18, fontWeight: 800, color: "var(--primary)" }}>{G.money(total)}</span>
                  </div>
                  <BtnC full onClick={onCheckout} style={{ marginBottom: 10 }}>Proceed to checkout</BtnC>
                  <BtnC full variant="ghost" onClick={onContinueShopping}>Continue shopping</BtnC>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // CUSTOMER CHECKOUT COMPONENT
    function CustomerCheckout({ shopId, cartItems, onConfirm, onBack }) {
      const [step, setStep] = useState(1);
      const [slot, setSlot] = useState(null);
      const [timeFilter, setTimeFilter] = useState("all");
      const [expandedDays, setExpandedDays] = useState(() => new Set([0]));
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [newsletterEmail, setNewsletterEmail] = useState("");
      const [newsletterDone, setNewsletterDone] = useState(false);
      const [processing, setProcessing] = useState(false);

      useEffect(() => {
        try {
          const stored = localStorage.getItem("customerAuth");
          if (stored) {
            const u = JSON.parse(stored);
            if (u.name) setName(u.name);
            if (u.email) { setEmail(u.email); setNewsletterEmail(u.email); }
          }
        } catch {}
      }, []);

      const shop = G.SHOPS.find(s => s.id === shopId);

      const cartProducts = useMemo(() =>
        Object.entries(cartItems)
          .filter(([, qty]) => qty > 0)
          .map(([id, qty]) => {
            const p = G.PRODUCTS.find(x => String(x.id) === String(id));
            return p ? { ...p, qty } : null;
          })
          .filter(Boolean),
        [cartItems]
      );

      const subtotal = cartProducts.reduce((s, p) => s + (parseFloat(p.price) || 0) * p.qty, 0);
      const tax = subtotal * 0.08;
      const total = subtotal + tax;

      const days = useMemo(() => {
        const now = new Date();
        const currentHour = now.getHours();
        return Array.from({ length: 7 }, (_, day) => {
          const d = new Date(now.getTime() + day * 86400000);
          const dateLabel = day === 0 ? "Today" : day === 1 ? "Tomorrow" :
            d.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
          const shortDate = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
          const slotDefs = [
            { id: "9-11",  label: "9:00 – 11:00 AM",  short: "9–11 AM",   startHour: 9,  period: "morning" },
            { id: "11-1",  label: "11:00 AM – 1:00 PM", short: "11AM–1PM", startHour: 11, period: "morning" },
            { id: "1-3",   label: "1:00 – 3:00 PM",   short: "1–3 PM",    startHour: 13, period: "afternoon" },
            { id: "3-5",   label: "3:00 – 5:00 PM",   short: "3–5 PM",    startHour: 15, period: "afternoon" },
            { id: "5-7",   label: "5:00 – 7:00 PM",   short: "5–7 PM",    startHour: 17, period: "evening" },
          ];
          const times = slotDefs.map((t, i) => ({
            ...t,
            slotId: `${day}-${t.id}`,
            available: !(day === 0 && t.startHour <= currentHour) && ((day * 5 + i) % 7 !== 2),
          }));
          return { day, dateLabel, shortDate, times };
        });
      }, []);

      const filteredDays = useMemo(() =>
        days.map(d => ({
          ...d,
          times: timeFilter === "all" ? d.times : d.times.filter(t => t.period === timeFilter),
        })).filter(d => d.times.length > 0),
        [days, timeFilter]
      );

      const selectedSlotLabel = useMemo(() => {
        if (!slot) return null;
        for (const d of days) {
          const t = d.times.find(t => t.slotId === slot);
          if (t) return `${d.dateLabel}, ${t.label}`;
        }
        return null;
      }, [slot, days]);

      const toggleDay = (day) => {
        setExpandedDays(prev => {
          const next = new Set(prev);
          if (next.has(day)) next.delete(day); else next.add(day);
          return next;
        });
      };

      const handleNext = () => {
        if (step === 2 && !slot) return;
        if (step === 3) {
          setProcessing(true);
          setTimeout(() => onConfirm({ deliveryType: "pickup", slot: selectedSlotLabel, email, name, total }), 800);
          return;
        }
        setStep(s => s + 1);
      };

      const renderSummary = (showNewsletter) => (
        <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 16, overflow: "hidden", boxShadow: "var(--shadow-md)" }}>
          {/* Store trust badge */}
          <div style={{ background: "linear-gradient(135deg, oklch(0.42 0.14 152) 0%, oklch(0.35 0.11 152) 100%)", padding: "14px 18px", display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: "1.4rem", flexShrink: 0 }}>🏪</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, fontWeight: 800, color: "rgba(255,255,255,0.55)", textTransform: "uppercase", letterSpacing: "0.07em" }}>Supporting local</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{shop ? shop.name : "Your local store"}</div>
            </div>
            <div style={{ background: "rgba(255,255,255,0.18)", borderRadius: 99, padding: "3px 10px", fontSize: 11, fontWeight: 700, color: "#fff", flexShrink: 0 }}>✓ Local</div>
          </div>

          {/* Items list */}
          <div style={{ padding: "14px 16px", borderBottom: "1px solid var(--line)", maxHeight: 180, overflowY: "auto" }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: "var(--text-3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>
              {cartProducts.length} item{cartProducts.length !== 1 ? "s" : ""}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
              {cartProducts.map(p => (
                <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", fontSize: 13 }}>
                  <span style={{ color: "var(--text-2)", minWidth: 0, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", paddingRight: 6 }}>
                    {p.name} <span style={{ color: "var(--text-3)", fontWeight: 600 }}>×{p.qty}</span>
                  </span>
                  <span style={{ color: "var(--text)", fontWeight: 700, flexShrink: 0 }}>{G.money(p.price * p.qty)}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Totals */}
          <div style={{ padding: "14px 16px", borderBottom: "1px solid var(--line)" }}>
            {[["Subtotal", G.money(subtotal)], ["Tax (8%)", G.money(tax)]].map(([l, v]) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 7 }}>
                <span style={{ color: "var(--text-2)" }}>{l}</span>
                <span style={{ color: "var(--text)" }}>{v}</span>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 16, fontWeight: 800, paddingTop: 10, marginTop: 6, borderTop: "1px solid var(--line)" }}>
              <span style={{ color: "var(--text)" }}>Total</span>
              <span style={{ color: "var(--primary)" }}>{G.money(total)}</span>
            </div>
            <div style={{ marginTop: 7, fontSize: 12, color: "var(--green-600)", fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
              <IconC name="check" size={13} stroke={2.5} />
              Free pickup — no delivery fee
            </div>
          </div>

          {/* Selected slot */}
          {slot && (
            <div style={{ padding: "11px 16px", background: "var(--green-100)", borderBottom: showNewsletter ? "1px solid var(--line)" : "none", display: "flex", alignItems: "center", gap: 8 }}>
              <IconC name="clock" size={14} style={{ color: "var(--green-600)", flexShrink: 0 }} />
              <span style={{ fontSize: 12, color: "var(--green-700)", fontWeight: 700 }}>{selectedSlotLabel}</span>
            </div>
          )}

          {/* Newsletter */}
          {showNewsletter && (
            <div style={{ padding: "16px 16px" }}>
              {newsletterDone
                ? <div style={{ textAlign: "center", padding: "8px", fontSize: 13, color: "var(--green-600)", fontWeight: 700 }}>🎉 You're subscribed!</div>
                : (
                  <div>

                  <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
                    <BtnC variant="ghost" onClick={() => setStep(1)}>← Back</BtnC>
                    <BtnC full onClick={handleNext} style={{ opacity: !slot ? 0.5 : 1, pointerEvents: !slot ? "none" : "auto" }}>
                      Review order →

                  </div>
                </div>

                {/* Sticky order summary */}
                <div style={{ position: "sticky", top: 20 }}>
                  {renderSummary(false)}
                </div>
              </div>
            )}

            {/* ── STEP 3: Review ── */}
            {step === 3 && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 28, alignItems: "start" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                  {/* Trust banner */}
                  <div style={{ background: "linear-gradient(135deg, var(--green-100) 0%, var(--blue-100) 100%)", border: "1px solid var(--green-300)", borderRadius: 14, padding: "14px 18px", display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: "1.5rem", flexShrink: 0 }}>🌱</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 800, color: "var(--green-700)" }}>Supporting local stores</div>
                      <div style={{ fontSize: 12, color: "var(--text-2)" }}>
                        This order supports <strong>{shop ? shop.name : "your community"}</strong> directly. No middlemen.
                      </div>
                    </div>
                    <div style={{ background: "var(--green-600)", color: "#fff", fontSize: 11, fontWeight: 800, padding: "4px 12px", borderRadius: 99, whiteSpace: "nowrap", flexShrink: 0 }}>
                      ✓ Local
                    </div>
                  </div>

                  {/* Pickup details */}
                  <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 20 }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: "var(--text)", marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
                      <IconC name="pin" size={16} style={{ color: "var(--primary)" }} />
                      Pickup details
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 11 }}>
                      {[
                        ["Store",    shop ? shop.name : "Selected store"],
                        ["Time",     selectedSlotLabel || "—"],
                        ["Ready in", "~15 min after arrival"],
                      ].map(([l, v]) => (
                        <div key={l} style={{ display: "flex", gap: 14, fontSize: 13 }}>
                          <span style={{ color: "var(--text-3)", minWidth: 68 }}>{l}</span>
                          <span style={{ fontWeight: 600, color: l === "Ready in" ? "var(--green-600)" : "var(--text)" }}>{v}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Contact */}
                  <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 20 }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: "var(--text)", marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
                      <IconC name="user" size={16} style={{ color: "var(--primary)" }} />
                      Contact info
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 11 }}>
                      {[["Name", name || "—"], ["Email", email || "—"]].map(([l, v]) => (
                        <div key={l} style={{ display: "flex", gap: 14, fontSize: 13 }}>
                          <span style={{ color: "var(--text-3)", minWidth: 68 }}>{l}</span>
                          <span style={{ fontWeight: 600, color: "var(--text)" }}>{v}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div style={{ display: "flex", gap: 12 }}>
                    <BtnC variant="ghost" onClick={() => setStep(2)}>← Back</BtnC>
                    <BtnC full onClick={handleNext} style={{ opacity: processing ? 0.7 : 1 }}>
                      {processing ? "Placing order…" : "Place order →"}
                    </BtnC>
                  </div>
                </div>

                {/* Sticky summary + newsletter */}
                <div style={{ position: "sticky", top: 20 }}>
                  {renderSummary(true)}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // CUSTOMER CONFIRMATION COMPONENT
    function CustomerConfirmation({ orderData, onNewOrder }) {
      const [order] = useState(() => ({
        id: "GG-" + Math.random().toString().slice(2, 6).padStart(4, "0"),
        timestamp: new Date(),
        ...orderData,
        items: 8,
      }));

      const [timeline, setTimeline] = useState([
        { id: "confirmed", label: "Order confirmed", time: "Just now", done: true },
        { id: "picking", label: "Starting to pick items", time: "2 min", done: false },
        { id: "quality", label: "Quality check", time: "8 min", done: false },
        { id: "ready", label: "Ready for pickup / dispatch", time: "12 min", done: false },
      ]);

      useEffect(() => {
        const intervals = [
          setTimeout(() => setTimeline(t => t.map(x => x.id === "picking" ? { ...x, done: true } : x)), 3000),
          setTimeout(() => setTimeline(t => t.map(x => x.id === "quality" ? { ...x, done: true } : x)), 8000),
          setTimeout(() => setTimeline(t => t.map(x => x.id === "ready" ? { ...x, done: true } : x)), 14000),
        ];
        return () => intervals.forEach(clearTimeout);
      }, []);

      const slotDisplay = order.slot || "9am–11am";

      return (
        <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh", background: "var(--bg)" }}>
          <ProgressIndicator currentStep={2} />
          <div style={{ padding: "20px 16px", maxWidth: 800, margin: "0 auto", flex: 1, display: "flex", flexDirection: "column", width: "100%" }}>
            {/* SUCCESS */}
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ width: 80, height: 80, borderRadius: 999, background: "var(--green-100)", color: "var(--green-700)", display: "grid", placeItems: "center", margin: "0 auto 18px" }}>
                <IconC name="checkCircle" size={44} stroke={2} />
              </div>
              <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 8px", color: "var(--text)" }}>Order confirmed!</h1>
              <p style={{ fontSize: 15, color: "var(--text-2)", margin: 0 }}>Thank you. Here's what happens next.</p>
            </div>

            {/* ORDER SUMMARY */}
            <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 16, padding: 20, marginBottom: 24 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20, paddingBottom: 20, borderBottom: "1px solid var(--line)" }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 4 }}>Order number</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text)" }}>{order.id}</div>
                </div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 4 }}>Total</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "var(--primary)" }}>${order.total.toFixed(2)}</div>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 4 }}>Delivery method</div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)", display: "flex", alignItems: "center", gap: 8 }}>
                    <IconC name={order.deliveryType === "delivery" ? "truck" : "store"} size={18} style={{ color: "var(--primary)" }} />
                    {order.deliveryType === "delivery" ? "Delivery" : "In-store pickup"}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 4 }}>Time slot</div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)", display: "flex", alignItems: "center", gap: 8 }}>
                    <IconC name="clock" size={18} style={{ color: "var(--primary)" }} />
                    {slotDisplay}
                  </div>
                </div>
              </div>
            </div>

            {/* TIMELINE */}
            <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 16, padding: 24, marginBottom: 24 }}>
              <h2 style={{ fontSize: 16, fontWeight: 800, margin: "0 0 20px", color: "var(--text)" }}>Order status</h2>
              <div style={{ position: "relative", paddingLeft: 32 }}>
                {timeline.map((step, i) => (
                  <div key={step.id} style={{ marginBottom: i < timeline.length - 1 ? 20 : 0, opacity: step.done ? 1 : 0.6 }}>
                    <div style={{ position: "absolute", left: 0, top: 6, width: 24, height: 24, borderRadius: 999, background: step.done ? "var(--primary)" : "var(--surface-2)", border: step.done ? "2px solid var(--primary)" : "2px solid var(--line-strong)", display: "grid", placeItems: "center", color: "var(--primary-ink)", fontWeight: 700, fontSize: 12 }}>
                      {step.done && <IconC name="check" size={13} stroke={3} />}
                    </div>
                    {i < timeline.length - 1 && (
                      <div style={{ position: "absolute", left: 11, top: 24, width: 2, height: 20, background: step.done ? "var(--primary)" : "var(--line-strong)" }} />
                    )}
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 15, color: "var(--text)", marginBottom: 2 }}>{step.label}</div>
                      <div style={{ fontSize: 12, color: "var(--text-2)" }}>{step.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* CTA */}
            <div style={{ display: "flex", gap: 12, marginTop: "auto" }}>
              <BtnC variant="ghost" full>Track order</BtnC>
              <BtnC full icon="home" onClick={onNewOrder}>Back to shopping</BtnC>
            </div>
          </div>
        </div>
      );
    }

    // MOBILE BOTTOM NAV
    function MobileBottomNav({ page, setPage, cartCount, shopId, onOpenShopSelector }) {
      const tabs = [
        { id: "home",   label: "Home",   icon: "home" },
        { id: "stores", label: "Stores", icon: "pin" },
        { id: "cart",   label: "Cart",   icon: "cart" },
        { id: "account",label: "Account",icon: "user" },
      ];

      const handleTab = (id) => {
        if (id === "stores") { onOpenShopSelector(); return; }
        if (id === "account") return; // opens top-bar user menu — no-op on mobile for now
        if (id === "cart") { setPage("cart"); return; }
        setPage("home");
      };

      const activeTab = page === "cart" ? "cart" : page === "home" ? "home" : page === "browse" ? "stores" : "home";

      return (
        <nav aria-label="Main navigation" className="showOnMobile mobile-bottom-nav" style={{
          position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 50,
          background: "var(--surface)",
          borderTop: "1px solid var(--line)",
          paddingBottom: "env(safe-area-inset-bottom, 0px)",
          boxShadow: "0 -4px 20px oklch(0 0 0 / 0.08)"
        }}>
          {tabs.map(tab => {
            const isActive = activeTab === tab.id;
            const isCart = tab.id === "cart";
            return (
              <button
                key={tab.id}
                aria-label={tab.label}
                aria-current={activeTab === tab.id ? "page" : undefined}
                onClick={() => handleTab(tab.id)}
                style={{
                  flex: 1, display: "flex", flexDirection: "column", alignItems: "center",
                  justifyContent: "center", gap: 4, padding: "10px 0 8px",
                  border: "none", background: "transparent",
                  color: isActive ? "var(--primary)" : "var(--text-3)",
                  cursor: "pointer", fontFamily: "var(--font-sans)",
                  transition: "color 0.15s",
                  position: "relative"
                }}
              >
                <div style={{ position: "relative" }}>
                  <IconC name={tab.icon} size={22} stroke={isActive ? 2.5 : 1.8} />
                  {isCart && cartCount > 0 && (
                    <span style={{
                      position: "absolute", top: -6, right: -8,
                      background: "var(--primary)", color: "var(--primary-ink)",
                      fontSize: 9, fontWeight: 800,
                      width: 16, height: 16, borderRadius: 999,
                      display: "grid", placeItems: "center"
                    }}>{cartCount > 9 ? "9+" : cartCount}</span>
                  )}
                </div>
                <span style={{ fontSize: 10, fontWeight: isActive ? 700 : 500 }}>{tab.label}</span>
                {isActive && (
                  <span style={{
                    position: "absolute", top: 0, left: "50%", transform: "translateX(-50%)",
                    width: 24, height: 3, borderRadius: "0 0 3px 3px",
                    background: "var(--primary)"
                  }} />
                )}
              </button>
            );
          })}
        </nav>
      );
    }

    // CUSTOMER SHELL - Main app layout wrapper
    function CustomerShell({ page, setPage, cartCount, user, onLogout, onLoginClick, onNavigate, shopId, onSelectShop }) {
      const [userMenuOpen, setUserMenuOpen] = useState(false);
      const [shopSelectorOpen, setShopSelectorOpen] = useState(false);
      const [storePopupShop, setStorePopupShop] = useState(null);
      const currentShopName = shopId ? (G.SHOPS.find(s => s.id === shopId)?.name || shopId) : null;
      const userMenuRef = React.useRef(null);

      React.useEffect(() => {
        if (!userMenuOpen) return;
        function handleClickOutside(e) {
          if (userMenuRef.current && !userMenuRef.current.contains(e.target)) {
            setUserMenuOpen(false);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);

    // ---- URL helpers ----
    function pageToPath(page, shopId) {
      if (page === "browse" && shopId) return `/shop/${shopId}`;
      if (page === "cart")         return "/cart";
      if (page === "checkout")     return "/checkout";
      if (page === "confirmation") return "/confirmation";
      return "/";
    }

    function ResetPasswordPage({ onDone }) {
      const params = new URLSearchParams(window.location.search);
      const email = params.get("email") || "";
      const token = params.get("token") || "";

      const [password, setPassword] = useState("");
      const [confirm, setConfirm] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [success, setSuccess] = useState(false);

      if (!email || !token) {
        return (
          <div style={authContainerStyle}>
            <div style={authCardStyle}>
              <h1 style={authHeadingStyle}>Invalid Link</h1>
              <p style={{ color: "var(--text-2)", textAlign: "center", marginBottom: 24 }}>
                This password reset link is missing required information.
              </p>
              <BtnC full onClick={onDone}>Back to Login</BtnC>
            </div>
          </div>
        );
      }

      if (success) {
        return (
          <div style={authContainerStyle}>
            <div style={authCardStyle}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>✅</div>
                <h1 style={authHeadingStyle}>Password Reset!</h1>
                <p style={{ color: "var(--text-2)", marginBottom: 24 }}>
                  Your password has been updated. You can now sign in.
                </p>
                <BtnC full onClick={onDone}>Go to Login</BtnC>
              </div>
            </div>
          </div>
        );
      }

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError("");
        if (!password || !confirm) { setError("Please fill in all fields"); return; }
        if (password !== confirm) { setError("Passwords do not match"); return; }
        if (!/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/.test(password)) {
          setError("Password must be 8+ characters with uppercase, lowercase, and a number");
          return;
        }
        setLoading(true);
        try {
          const res = await fetch(`${API_BASE}/customers/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, token, newPassword: password }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error || "Reset failed. The link may have expired."); return; }
          setSuccess(true);
          window.history.replaceState({}, "", "/");
        } catch {
          setError("Cannot connect to server. Please try again.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={authContainerStyle}>
          <div style={authCardStyle}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 28 }}>
              <LogoCustomer size={32} />
            </div>
            <h1 style={authHeadingStyle}>Set new password</h1>
            <p style={authSubtitleStyle}>Enter a new password for <strong>{email}</strong></p>

            {error && (
              <div style={{ background: "var(--red-100)", color: "var(--red-700)", padding: "12px 14px",
                borderRadius: 10, fontSize: 13, marginBottom: 16, border: "1px solid var(--red-300)" }}>
                {error}
              </div>
            )}

            <form onSubmit={handleSubmit}>
              <AuthField label="New password">
                <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                  placeholder="Min 8 chars, upper, lower, number" style={authInputStyle} />
              </AuthField>
              <AuthField label="Confirm new password">
                <input type="password" value={confirm} onChange={e => setConfirm(e.target.value)}
                  placeholder="••••••••" style={authInputStyle} />
              </AuthField>
              <BtnC full type="submit" style={{ opacity: loading ? 0.7 : 1 }}>
                {loading ? "Resetting…" : "Reset Password"}
              </BtnC>
            </form>
          </div>
        </div>
      );
    }

    function pathToState(pathname) {
      if (pathname.startsWith("/shop/"))    return { page: "browse",       shopId: pathname.slice(6) };
      if (pathname === "/cart")             return { page: "cart",          shopId: null };
      if (pathname === "/checkout")         return { page: "checkout",      shopId: null };
      if (pathname === "/confirmation")     return { page: "confirmation",  shopId: null };
      if (pathname === "/reset-password")   return { page: "reset-password", shopId: null };
      return { page: "home", shopId: null };
    }

    function CustomerApp() {
      const [user, setUser] = useState(() => {
        const stored = localStorage.getItem("customerAuth");
        return stored ? JSON.parse(stored) : null;
      });
      const [authPage, setAuthPage] = useState("login");
      const [showAuth, setShowAuth] = useState(false);
      const [pendingCartId, setPendingCartId] = useState(null);

      // Initialise from current URL
      const initState = pathToState(window.location.pathname);
      const [page, setPageState] = useState(initState.page);
      const [shopId, setShopId] = useState(() => {
        // URL has priority (e.g. /shop/:id), else restore last selected shop
        return initState.shopId || localStorage.getItem("shopId") || null;
      });
      const [cartItems, setCartItems] = useState({});
      const [orderData, setOrderData] = useState(null);
      const cartSyncTimer = React.useRef(null);

      const syncCartToServer = (items) => {
        clearTimeout(cartSyncTimer.current);
        cartSyncTimer.current = setTimeout(async () => {
          try {
            await customerFetch(`${API_BASE}/customers/auth/cart`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ cart: items }),
            });
          } catch { /* silent — cart will sync next time */ }
        }, 600);
      };

      // navigate() updates both React state and the browser URL
      const navigate = (newPage, newShopId) => {
        const sid = newShopId !== undefined ? newShopId : shopId;
        const path = pageToPath(newPage, sid);
        window.history.pushState({ page: newPage, shopId: sid }, "", path);
        setPageState(newPage);
        if (newShopId !== undefined) setShopId(newShopId);
      };

      // Persist selected shop across page refreshes
      useEffect(() => {
        if (shopId) localStorage.setItem("shopId", shopId);
      }, [shopId]);

      // Load cart from server on mount if already logged in (e.g. after page refresh)
      useEffect(() => {
        if (!user) return;
        customerFetch(`${API_BASE}/customers/auth/cart`)
          .then(res => res && res.json())
          .then(data => { if (data?.cart) setCartItems(data.cart); })
          .catch(() => {});
      }, []);

      // Handle browser back / forward buttons
      useEffect(() => {
        const onPop = (e) => {
          const s = e.state || pathToState(window.location.pathname);
          setPageState(s.page || "home");
          if (s.shopId !== undefined) setShopId(s.shopId);
        };
        window.addEventListener("popstate", onPop);
        // Push initial state so first back-press goes to "/" not out of app
        window.history.replaceState(
          { page: initState.page, shopId: initState.shopId },
          "",
          window.location.pathname
        );
        return () => window.removeEventListener("popstate", onPop);
      }, []);

      const handleSelectShop = (id) => {
        setShopId(id);
        navigate("browse", id);
      };


      const handleAddToCart = (id) => {
        if (!user) {
          setPendingCartId(id);
          setAuthPage("login");
          setShowAuth(true);
          return;
        }
        setCartItems(c => {
          const updated = { ...c, [id]: (c[id] || 0) + 1 };
          syncCartToServer(updated);
          return updated;
        });
      };

      const handleUpdateCart = (id, qty) => {
        setCartItems(c => {
          let updated;
          if (qty <= 0) { updated = { ...c }; delete updated[id]; }
          else { updated = { ...c, [id]: qty }; }
          syncCartToServer(updated);
          return updated;
        });
      };

      const handleCheckout = () => {
        if (!user) { setAuthPage("login"); setShowAuth(true); return; }
        navigate("checkout");
      };

      const handleConfirm = (data) => {
        setOrderData(data);
        setCartItems({});
        syncCartToServer({});
        navigate("confirmation");
      };

      const handleNewOrder = () => {
        setShopId(null);
        navigate("home", null);
      };

      const handleContinueShopping = () => navigate("browse");

      const handleLoginSuccess = async (userData) => {
        setUser(userData);
        setShowAuth(false);
        try {
          const res = await customerFetch(`${API_BASE}/customers/auth/cart`);
          const data = res ? await res.json() : null;
          const serverCart = data?.cart || {};
          if (pendingCartId) {
            const merged = { ...serverCart, [pendingCartId]: (serverCart[pendingCartId] || 0) + 1 };
            setCartItems(merged);
            syncCartToServer(merged);
            setPendingCartId(null);
          } else {
            setCartItems(serverCart);
          }
        } catch {
          if (pendingCartId) {
            setCartItems({ [pendingCartId]: 1 });
            setPendingCartId(null);
          }
        }
      };
      const handleSignupSuccess = (userData) => {
        setUser(userData);
        setShowAuth(false);
      };
      const handleLogout = () => {
        localStorage.removeItem("customerToken");
        localStorage.removeItem("customerRefreshToken");
        localStorage.removeItem("customerAuth");
        setUser(null);
        setCartItems({});
        setShopId(null);
        navigate("home", null);
      };

      // setPage shim so Shell can still call setPage("cart") etc.
      const setPage = (p) => navigate(p);

      if (page === "reset-password") {
        return <ResetPasswordPage onDone={() => { navigate("home"); setAuthPage("login"); }} />;
      }

      if (showAuth && !user) {
        if (authPage === "login") {
          return <CustomerLogin onLoginSuccess={handleLoginSuccess} onSignupClick={() => setAuthPage("signup")} onForgotClick={() => setAuthPage("forgot")} />;
        } else if (authPage === "signup") {
          return <CustomerSignup onSignupSuccess={handleSignupSuccess} onLoginClick={() => setAuthPage("login")} />;
        } else if (authPage === "forgot") {
          return <ForgotPassword onBack={() => setAuthPage("login")} />;
        }
      }

      const cartCount = Object.values(cartItems).reduce((s, q) => s + q, 0);

      const screens = {
        home: <CustomerHomepage onSelectShop={handleSelectShop} shopId={shopId} onGoToBrowse={() => setPage("browse")} />,
        browse: shopId && <CustomerBrowse shopId={shopId} cartItems={cartItems} onAddToCart={handleAddToCart} onUpdateCart={handleUpdateCart} onChangeShop={handleSelectShop} />,
        cart: <CustomerCart shopId={shopId} cartItems={cartItems} onUpdateCart={handleUpdateCart} onCheckout={handleCheckout} onContinueShopping={handleContinueShopping} />,
        checkout: <CustomerCheckout shopId={shopId} cartItems={cartItems} onConfirm={handleConfirm} onBack={() => setPage("cart")} />,
        confirmation: orderData && <CustomerConfirmation orderData={orderData} onNewOrder={handleNewOrder} />,
      };

      return (
        <CustomerShell
          page={page}
          setPage={setPage}
          cartCount={cartCount}
          user={user}
          onLogout={handleLogout}
          onLoginClick={() => { setAuthPage("login"); setShowAuth(true); }}
          onNavigate={screens[page]}
          shopId={shopId}
          onSelectShop={handleSelectShop}
        />
      );
    }

    try {
      console.log("🎯 Creating React root...");
      const root = ReactDOM.createRoot(document.getElementById("root"));
      console.log("🎯 Rendering CustomerApp...");
      root.render(<CustomerApp />);
      console.log("✅ App rendered successfully!");
    } catch (error) {
      console.error("❌ ERROR:", error);
      console.error("Stack:", error.stack);
      document.getElementById("root").innerHTML = `<div style="padding:20px; color:red; font-family:monospace;"><h2>Error loading app:</h2><pre>${error.message}\n\n${error.stack}</pre></div>`;
    }
  </script>
</body>
</html>
