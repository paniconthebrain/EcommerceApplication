              {currentShop && (
                <div style={{ marginTop: 20 }}>
                  <ShopInfoCard shop={currentShop} onChangeShop={() => {}} />
                </div>
              )}
            </div>

            {/* PRODUCTS */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, color: "var(--text-2)", fontWeight: 600 }}>
                  {products.length === G.productsByCat(cat).length
                    ? <>{products.length} product{products.length !== 1 ? "s" : ""}</>
                    : <><span style={{ color: "var(--text)", fontWeight: 800 }}>{products.length}</span> of {G.productsByCat(cat).length} products</>
                  }
                </span>
                {products.length < G.productsByCat(cat).length && (
                  <span style={{ fontSize: 11, color: "var(--primary)", fontWeight: 700, background: "oklch(0.96 0.04 152)", padding: "3px 10px", borderRadius: 999 }}>Filtered</span>
                )}
              </div>
              {products.length === 0 ? (
                <div style={{ textAlign: "center", padding: "60px 20px", color: "var(--text-3)" }}>
                  <IconC name="search" size={40} style={{ opacity: 0.3, marginBottom: 12 }} />
                  <p style={{ fontSize: 16, fontWeight: 600, margin: 0 }}>No products found</p>
                </div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 14 }}>
                  {products.map(p => {
                    const inCart = cartItems[p.id] || 0;
                    const stockState = G.stockState(p.stock);
                    const disabled = stockState === "out";
                    return (
                      <ProductCardEnhanced key={p.id} product={p} inCart={inCart} disabled={disabled} stockState={stockState} onAdd={() => onAddToCart(p.id)} onAddQty={() => onAddToCart(p.id)} onRemoveQty={() => onUpdateCart && onUpdateCart(p.id, Math.max(0, inCart - 1))} onClick={() => setSelectedProduct(p)} />
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* MOBILE FILTER MODAL */}
          {/* PRODUCT DETAIL MODAL */}
          {selectedProduct && (
            <ProductDetailModal
              product={selectedProduct}
              inCart={cartItems[selectedProduct.id] || 0}
              onClose={() => setSelectedProduct(null)}
              onAdd={() => onAddToCart(selectedProduct.id)}
              onUpdateCart={onUpdateCart}
            />
          )}

          {showFiltersModal && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, top: 0, background: "rgba(0,0,0,0.4)", zIndex: 40, display: "flex", alignItems: "flex-end" }} className="mobile-filter-modal" onClick={() => setShowFiltersModal(false)}>
              <div onClick={e => e.stopPropagation()} style={{ width: "100%", background: "var(--surface)", borderRadius: "16px 16px 0 0", padding: "20px 16px", maxHeight: "80vh", overflowY: "auto", display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <h3 style={{ fontSize: 18, fontWeight: 800, color: "var(--text)", margin: 0 }}>Filters</h3>
                  <button onClick={() => setShowFiltersModal(false)} style={{ background: "none", border: "none", fontSize: 24, color: "var(--text-2)", cursor: "pointer" }}>×</button>
                </div>
                <FilterSidebar priceRange={priceRange} onPriceChange={setPriceRange} showInStockOnly={showInStockOnly} onStockToggle={setShowInStockOnly} showOnSaleOnly={showOnSaleOnly} onSaleToggle={setShowOnSaleOnly} resetFilters={resetFilters} />
                <BtnC full onClick={() => setShowFiltersModal(false)} style={{ marginTop: "auto" }}>Apply Filters</BtnC>
              </div>
            </div>
          )}
        </div>
      );
    }

    // CUSTOMER CART COMPONENT
    function CustomerCart({ shopId, cartItems, onUpdateCart, onCheckout, onContinueShopping }) {
      const cartProducts = useMemo(() => {
        return Object.entries(cartItems).filter(([, qty]) => qty > 0).map(([id, qty]) => {
          const p = G.PRODUCTS.find(x => String(x.id) === String(id));
          if (!p) return null;
          return { ...p, qty, stock: G.shopStock(p.id, shopId), subtotal: (parseFloat(p.price) || 0) * qty };
        }).filter(Boolean);
      }, [cartItems, shopId]);

      const subtotal = cartProducts.reduce((s, p) => s + p.subtotal, 0);
      const deliveryFee = subtotal > 0 ? 3.99 : 0;
      const tax = subtotal * 0.08;
      const total = subtotal + deliveryFee + tax;
      const isEmpty = cartProducts.length === 0;

      return (
        <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh", background: "var(--bg)" }}>
          <ProgressIndicator currentStep={0} />
          <div style={{ padding: "20px 16px", maxWidth: 900, margin: "0 auto", width: "100%", flex: 1 }}>
            <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 20px", color: "var(--text)" }}>Your cart</h1>
            {isEmpty ? (
              <div style={{ textAlign: "center", padding: "80px 20px", color: "var(--text-3)" }}>
                <IconC name="cart" size={48} style={{ opacity: 0.3, marginBottom: 16 }} />
                <p style={{ fontSize: 18, fontWeight: 600, margin: 0 }}>Your cart is empty</p>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 340px", gap: 24 }}>
                {/* ITEMS */}
                <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 0, overflow: "hidden" }}>
                  <div style={{ padding: 16, borderBottom: "1px solid var(--line)", fontSize: 15, fontWeight: 700, color: "var(--text)" }}>
                    {cartProducts.length} item{cartProducts.length !== 1 ? 's' : ''}
                  </div>
                  <div>
                    {cartProducts.map((p, i) => (
                      <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 16px", borderTop: i ? "1px solid var(--line)" : "none" }}>
                        <div style={{ width: 70, height: 70, borderRadius: 11, background: `oklch(0.92 0.07 ${G.catOf(p.cat).hue})`, display: "grid", placeItems: "center", flexShrink: 0, fontSize: "1.8rem" }}>🛒</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 600, fontSize: 14, color: "var(--text)", marginBottom: 2 }}>{p.name}</div>
                          <div style={{ fontSize: 12, color: "var(--text-2)" }}>{p.unit} · ${p.price.toFixed(2)}</div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <button onClick={() => onUpdateCart(p.id, Math.max(0, p.qty - 1))} style={{ width: 28, height: 28, borderRadius: 7, border: "1px solid var(--line)", background: "transparent", color: "var(--text-2)", cursor: "pointer", fontFamily: "var(--font-sans)" }}>−</button>
                          <span style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", minWidth: 24, textAlign: "center" }}>{p.qty}</span>
                          <button onClick={() => onUpdateCart(p.id, p.qty + 1)} style={{ width: 28, height: 28, borderRadius: 7, border: "1px solid var(--line)", background: "transparent", color: "var(--text-2)", cursor: "pointer", fontFamily: "var(--font-sans)" }}>+</button>
                        </div>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", minWidth: 60, textAlign: "right" }}>${p.subtotal.toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* SUMMARY */}
                <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 20, height: "fit-content", position: "sticky", top: 80 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16, color: "var(--text)" }}>Order summary</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10, fontSize: 13, marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", color: "var(--text-2)" }}>
                      <span>Subtotal</span>
                      <span>${subtotal.toFixed(2)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", color: "var(--text-2)" }}>
                      <span>Delivery</span>
                      <span>${deliveryFee.toFixed(2)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", color: "var(--text-2)" }}>
                      <span>Tax</span>
                      <span>${tax.toFixed(2)}</span>
                    </div>
                  </div>
                  <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginBottom: 18, display: "flex", justifyContent: "space-between" }}>
                    <span style={{ fontWeight: 700, color: "var(--text)" }}>Total</span>
                    <span style={{ fontSize: 18, fontWeight: 800, color: "var(--primary)" }}>${total.toFixed(2)}</span>
                  </div>
                  <BtnC full onClick={onCheckout} style={{ marginBottom: 10 }}>Proceed to checkout</BtnC>
                  <BtnC full variant="ghost" onClick={onContinueShopping}>Continue shopping</BtnC>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // CUSTOMER CHECKOUT COMPONENT
    function CustomerCheckout({ shopId, cartItems, onConfirm, onBack }) {
      const [step, setStep] = useState(1);
      const [deliveryType, setDeliveryType] = useState("delivery");
      const [slot, setSlot] = useState(null);
      const [email, setEmail] = useState("maya@example.com");
      const [name, setName] = useState("Maya Thompson");
      const [address, setAddress] = useState("21st & Valencia St");
      const [processing, setProcessing] = useState(false);

      const cartProducts = Object.entries(cartItems).filter(([, qty]) => qty > 0).map(([id, qty]) => {
        const p = G.PRODUCTS.find(x => String(x.id) === String(id));
        if (!p) return null;
        return { ...p, qty };
      }).filter(Boolean);

      const subtotal = cartProducts.reduce((s, p) => s + (parseFloat(p.price) || 0) * p.qty, 0);
      const deliveryFee = deliveryType === "pickup" ? 0 : 3.99;
      const tax = subtotal * 0.08;
      const total = subtotal + deliveryFee + tax;

      const slots = useMemo(() => {
        const arr = [];
        const now = new Date();
        for (let day = 0; day < 7; day++) {
          const d = new Date(now.getTime() + day * 24 * 60 * 60 * 1000);
          const dStr = d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
          for (const time of ["9am–11am", "11am–1pm", "1pm–3pm", "3pm–5pm", "5pm–7pm"]) {
            arr.push({ id: `${day}-${time}`, display: `${dStr} · ${time}`, day, time });
          }
        }
        return arr;
      }, []);

      const handleConfirm = () => {
        if (step === 1 && !deliveryType) return;
        if (step === 2 && !slot) return;
        if (step === 3) {
          setProcessing(true);
          setTimeout(() => {
            onConfirm({ deliveryType, slot, email, name, address, total });
          }, 800);
          return;
        }
        setStep(step + 1);
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh", background: "var(--bg)" }}>
          <ProgressIndicator currentStep={1} />
          <div style={{ padding: "20px 16px", maxWidth: 900, margin: "0 auto", width: "100%", flex: 1 }}>
            {/* PROGRESS */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 32 }}>
              {[1, 2, 3].map(s => (
                <div key={s} style={{ display: "flex", alignItems: "center", gap: 12, flex: 1 }}>
                  <div style={{ width: 40, height: 40, borderRadius: 999, display: "grid", placeItems: "center", fontWeight: 700, background: s <= step ? "var(--primary)" : "var(--surface-2)", color: s <= step ? "var(--primary-ink)" : "var(--text-3)" }}>
                    {s < step ? <IconC name="check" size={20} /> : s}
                  </div>
                  {s < 3 && <div style={{ flex: 1, height: 2, background: s < step ? "var(--primary)" : "var(--surface-2)" }} />}
                </div>
              ))}
            </div>

            {/* STEP 1 */}
            {step === 1 && (
              <div style={{ maxWidth: 600 }}>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 20px", color: "var(--text)" }}>How would you like to receive your order?</h2>
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {[["delivery", "🚚 Delivery", "Delivered to your door within 2 hours"], ["pickup", "🏪 In-store pickup", "Pick up at " + G.SHOPS.find(s => s.id === shopId)?.name]].map(([id, label, desc]) => (
                    <button key={id} onClick={() => setDeliveryType(id)} style={{ textAlign: "left", padding: 20, borderRadius: 14, border: "2px solid", borderColor: deliveryType === id ? "var(--primary)" : "var(--line)", background: deliveryType === id ? "color-mix(in oklch, var(--primary) 10%, transparent)" : "transparent", cursor: "pointer", fontFamily: "var(--font-sans)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                        <div style={{ width: 24, height: 24, borderRadius: 999, border: "2px solid", borderColor: deliveryType === id ? "var(--primary)" : "var(--line-strong)", background: deliveryType === id ? "var(--primary)" : "transparent" }} />
                        <div>
                          <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text)" }}>{label}</div>
                          <div style={{ fontSize: 13, color: "var(--text-2)", marginTop: 2 }}>{desc}</div>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* STEP 2 */}
            {step === 2 && (
              <div style={{ maxWidth: 700 }}>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 20px", color: "var(--text)" }}>Choose your {deliveryType} time</h2>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 10 }}>
                  {slots.map(s => (
                    <button key={s.id} onClick={() => setSlot(s.id)} style={{ padding: 14, borderRadius: 11, border: "2px solid", borderColor: slot === s.id ? "var(--primary)" : "var(--line)", background: slot === s.id ? "color-mix(in oklch, var(--primary) 10%, transparent)" : "transparent", cursor: "pointer", textAlign: "center", fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 700, color: "var(--text)" }}>
                      {s.display}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* STEP 3 */}
            {step === 3 && (
              <div style={{ maxWidth: 600 }}>
                <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 24px", color: "var(--text)" }}>Review your order</h2>
                <div style={{ display: "flex", flexDirection: "column", gap: 18, marginBottom: 28 }}>
                  <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 18 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", marginBottom: 12 }}>Delivery details</div>
                    <div style={{ display: "flex", gap: 12, fontSize: 13, color: "var(--text-2)" }}>
                      <IconC name={deliveryType === "delivery" ? "truck" : "store"} size={18} style={{ color: "var(--primary)", marginTop: 1 }} />
                      <div>
                        <div style={{ fontWeight: 600, color: "var(--text)", marginBottom: 2 }}>{deliveryType === "delivery" ? "Delivery" : "Pickup"} · {slots.find(s => s.id === slot)?.display || "Select time"}</div>
                        {deliveryType === "delivery" && <div>{address}</div>}
                      </div>
                    </div>
                  </div>
                  <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 18 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "var(--text)", marginBottom: 12 }}>{cartProducts.length} items</div>
                    {cartProducts.map(p => (
                      <div key={p.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "var(--text-2)", marginBottom: 8, paddingBottom: 8, borderBottom: "1px solid var(--line-strong)" }}>
                        <span>{p.name} × {p.qty}</span>
                        <span>${(p.price * p.qty).toFixed(2)}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 14, padding: 18 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 10 }}>
                      <span style={{ color: "var(--text-2)" }}>Subtotal</span>
                      <span style={{ color: "var(--text)" }}>${subtotal.toFixed(2)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 10 }}>
                      <span style={{ color: "var(--text-2)" }}>{deliveryType === "delivery" ? "Delivery fee" : "Pickup"}</span>
                      <span style={{ color: "var(--text)" }}>${deliveryFee.toFixed(2)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, paddingBottom: 10, borderBottom: "1px solid var(--line-strong)" }}>
                      <span style={{ color: "var(--text-2)" }}>Tax</span>
                      <span style={{ color: "var(--text)" }}>${tax.toFixed(2)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 16, fontWeight: 800, marginTop: 10 }}>
                      <span>Total</span>
                      <span style={{ color: "var(--primary)" }}>${total.toFixed(2)}</span>
                    </div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 12 }}>
                  <BtnC variant="ghost" full onClick={onBack}>Cancel</BtnC>
                  <BtnC full onClick={handleConfirm} style={{ opacity: processing ? 0.7 : 1 }}>
                    {processing ? "Processing…" : "Place order"}
                  </BtnC>
                </div>
              </div>
            )}

            {/* FOOTER NAV */}
            {step > 1 && step !== 3 && (
              <div style={{ display: "flex", gap: 12, marginTop: 32 }}>
                <BtnC variant="ghost" full onClick={() => setStep(step - 1)}>Back</BtnC>
                <BtnC full onClick={handleConfirm} style={{ opacity: (step === 1 && !deliveryType) || (step === 2 && !slot) ? 0.5 : 1, pointerEvents: (step === 1 && !deliveryType) || (step === 2 && !slot) ? "none" : "auto" }}>
                  {step === 2 ? "Review order" : "Next"}
                </BtnC>
              </div>
            )}
          </div>
        </div>
      );
    }

    // CUSTOMER CONFIRMATION COMPONENT
    function CustomerConfirmation({ orderData, onNewOrder }) {
      const [order] = useState(() => ({
        id: "GG-" + Math.random().toString().slice(2, 6).padStart(4, "0"),
        timestamp: new Date(),
        ...orderData,
        items: 8,
      }));

      const [timeline, setTimeline] = useState([
        { id: "confirmed", label: "Order confirmed", time: "Just now", done: true },
        { id: "picking", label: "Starting to pick items", time: "2 min", done: false },
        { id: "quality", label: "Quality check", time: "8 min", done: false },
        { id: "ready", label: "Ready for pickup / dispatch", time: "12 min", done: false },
      ]);

      useEffect(() => {
        const intervals = [
          setTimeout(() => setTimeline(t => t.map(x => x.id === "picking" ? { ...x, done: true } : x)), 3000),
          setTimeout(() => setTimeline(t => t.map(x => x.id === "quality" ? { ...x, done: true } : x)), 8000),
          setTimeout(() => setTimeline(t => t.map(x => x.id === "ready" ? { ...x, done: true } : x)), 14000),
        ];
        return () => intervals.forEach(clearTimeout);
      }, []);

      const slotDisplay = order.slot || "9am–11am";

      return (
        <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh", background: "var(--bg)" }}>
          <ProgressIndicator currentStep={2} />
          <div style={{ padding: "20px 16px", maxWidth: 800, margin: "0 auto", flex: 1, display: "flex", flexDirection: "column", width: "100%" }}>
            {/* SUCCESS */}
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ width: 80, height: 80, borderRadius: 999, background: "var(--green-100)", color: "var(--green-700)", display: "grid", placeItems: "center", margin: "0 auto 18px" }}>
                <IconC name="checkCircle" size={44} stroke={2} />
              </div>
              <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 8px", color: "var(--text)" }}>Order confirmed!</h1>
              <p style={{ fontSize: 15, color: "var(--text-2)", margin: 0 }}>Thank you. Here's what happens next.</p>
            </div>

            {/* ORDER SUMMARY */}
            <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 16, padding: 20, marginBottom: 24 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20, paddingBottom: 20, borderBottom: "1px solid var(--line)" }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 4 }}>Order number</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "var(--text)" }}>{order.id}</div>
                </div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 4 }}>Total</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "var(--primary)" }}>${order.total.toFixed(2)}</div>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 4 }}>Delivery method</div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)", display: "flex", alignItems: "center", gap: 8 }}>
                    <IconC name={order.deliveryType === "delivery" ? "truck" : "store"} size={18} style={{ color: "var(--primary)" }} />
                    {order.deliveryType === "delivery" ? "Delivery" : "In-store pickup"}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: "var(--text-3)", marginBottom: 4 }}>Time slot</div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "var(--text)", display: "flex", alignItems: "center", gap: 8 }}>
                    <IconC name="clock" size={18} style={{ color: "var(--primary)" }} />
                    {slotDisplay}
                  </div>
                </div>
              </div>
            </div>

            {/* TIMELINE */}
            <div style={{ background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 16, padding: 24, marginBottom: 24 }}>
              <h2 style={{ fontSize: 16, fontWeight: 800, margin: "0 0 20px", color: "var(--text)" }}>Order status</h2>
              <div style={{ position: "relative", paddingLeft: 32 }}>
                {timeline.map((step, i) => (
                  <div key={step.id} style={{ marginBottom: i < timeline.length - 1 ? 20 : 0, opacity: step.done ? 1 : 0.6 }}>
                    <div style={{ position: "absolute", left: 0, top: 6, width: 24, height: 24, borderRadius: 999, background: step.done ? "var(--primary)" : "var(--surface-2)", border: step.done ? "2px solid var(--primary)" : "2px solid var(--line-strong)", display: "grid", placeItems: "center", color: "var(--primary-ink)", fontWeight: 700, fontSize: 12 }}>
                      {step.done && <IconC name="check" size={13} stroke={3} />}
                    </div>
                    {i < timeline.length - 1 && (
                      <div style={{ position: "absolute", left: 11, top: 24, width: 2, height: 20, background: step.done ? "var(--primary)" : "var(--line-strong)" }} />
                    )}
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 15, color: "var(--text)", marginBottom: 2 }}>{step.label}</div>
                      <div style={{ fontSize: 12, color: "var(--text-2)" }}>{step.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* CTA */}

    }

              <div style={{ position: "relative" }}>
                <button
                  onClick={() => setUserMenuOpen(!userMenuOpen)}

                    <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--line)" }}>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "var(--text)" }}>{user?.name || "Account"}</div>

              <button onClick={() => setPage("cart")} style={{ position: "relative", width: 40, height: 40, borderRadius: 10, border: "none", background: "transparent", color: "var(--text-2)", cursor: "pointer", display: "grid", placeItems: "center", transition: "all .15s" }}>

                {cartCount > 0 && <span style={{ position: "absolute", top: -6, right: -4, background: "var(--primary)", color: "var(--primary-ink)", fontSize: 10, fontWeight: 800, width: 18, height: 18, borderRadius: 999, display: "grid", placeItems: "center" }}>{cartCount}</span>}

          {/* Main content */}

          <footer style={{ background: "oklch(0.18 0.02 152)", color: "#fff", marginTop: "auto" }}>

                  <button style={{ padding: "11px 22px", borderRadius: 10, border: "none", background: "var(--primary)", color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "var(--font-sans)", whiteSpace: "nowrap" }}>Subscribe</button>

                  <span style={{ fontSize: 16, fontWeight: 900, letterSpacing: "-0.01em" }}>GoGO<span style={{ color: "var(--primary)" }}>Pantry</span></span>

                <p style={{ fontSize: 13, opacity: 0.6, lineHeight: 1.6, margin: 0 }}>Fresh groceries, delivered fast. Supporting local stores every day.</p>
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", opacity: 0.5, marginBottom: 14 }}>Company</div>
                {["About Us","Careers","Press","Blog"].map(l => <div key={l} style={{ fontSize: 13, opacity: 0.7, marginBottom: 8, cursor: "pointer" }} onMouseEnter={e => e.currentTarget.style.opacity="1"} onMouseLeave={e => e.currentTarget.style.opacity="0.7"}>{l}</div>)}
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", opacity: 0.5, marginBottom: 14 }}>Support</div>
                {["Help Center","Track Order","Returns","Contact Us"].map(l => <div key={l} style={{ fontSize: 13, opacity: 0.7, marginBottom: 8, cursor: "pointer" }} onMouseEnter={e => e.currentTarget.style.opacity="1"} onMouseLeave={e => e.currentTarget.style.opacity="0.7"}>{l}</div>)}
              </div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: "0.08em", textTransform: "uppercase", opacity: 0.5, marginBottom: 14 }}>Follow Us</div>
                <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                  {[["📘","Facebook"],["📸","Instagram"],["🐦","Twitter"],["▶️","YouTube"]].map(([ic,lb]) => (
                    <button key={lb} title={lb} style={{ width: 38, height: 38, borderRadius: 10, border: "1px solid rgba(255,255,255,0.2)", background: "rgba(255,255,255,0.07)", cursor: "pointer", fontSize: "1.1rem", display: "grid", placeItems: "center", transition: "all 0.15s" }}
                      onMouseEnter={e => { e.currentTarget.style.background="rgba(255,255,255,0.18)"; e.currentTarget.style.transform="translateY(-2px)"; }}

                <div style={{ display: "flex", gap: 20 }}>

          {/* Shop Selector list */}
          <ShopSelector
            isOpen={shopSelectorOpen && !storePopupShop}
            onClose={() => setShopSelectorOpen(false)}

            currentShopId={shopId}
          />

          {/* StorePopup — compact toast (mobile) / modal (desktop) */}
          <StorePopup
            shop={storePopupShop}
            isOpen={!!storePopupShop}

            onSelectShop={(id) => { onSelectShop(id); setStorePopupShop(null); }}
          />

      );
    }

    // ---- URL helpers ----
    function pageToPath(page, shopId) {
      if (page === "browse" && shopId) return `/shop/${shopId}`;
      if (page === "cart")         return "/cart";
      if (page === "checkout")     return "/checkout";
      if (page === "confirmation") return "/confirmation";
      return "/";
    }

    function pathToState(pathname) {
      if (pathname.startsWith("/shop/")) return { page: "browse", shopId: pathname.slice(6) };
      if (pathname === "/cart")         return { page: "cart",         shopId: null };
      if (pathname === "/checkout")     return { page: "checkout",     shopId: null };
      if (pathname === "/confirmation") return { page: "confirmation", shopId: null };
      return { page: "home", shopId: null };
    }

    function CustomerApp() {
      const [user, setUser] = useState(() => {
        const stored = localStorage.getItem("customerAuth");
        return stored ? JSON.parse(stored) : null;
      });
      const [authPage, setAuthPage] = useState("login");

      // Initialise from current URL
      const initState = pathToState(window.location.pathname);
      const [page, setPageState] = useState(initState.page);
      const [shopId, setShopId] = useState(initState.shopId);
      const [cartItems, setCartItems] = useState({});
      const [orderData, setOrderData] = useState(null);

      // navigate() updates both React state and the browser URL
      const navigate = (newPage, newShopId) => {
        const sid = newShopId !== undefined ? newShopId : shopId;
        const path = pageToPath(newPage, sid);
        window.history.pushState({ page: newPage, shopId: sid }, "", path);
        setPageState(newPage);
        if (newShopId !== undefined) setShopId(newShopId);
      };

      // Handle browser back / forward buttons
      useEffect(() => {
        const onPop = (e) => {
          const s = e.state || pathToState(window.location.pathname);
          setPageState(s.page || "home");
          if (s.shopId !== undefined) setShopId(s.shopId);
        };
        window.addEventListener("popstate", onPop);
        // Push initial state so first back-press goes to "/" not out of app
        window.history.replaceState(
          { page: initState.page, shopId: initState.shopId },
          "",
          window.location.pathname
        );
        return () => window.removeEventListener("popstate", onPop);
      }, []);

      const handleSelectShop = (id) => {
        setShopId(id);
        navigate("browse", id);
      };


      const handleAddToCart = (id) => {
        setCartItems(c => ({ ...c, [id]: (c[id] || 0) + 1 }));
      };

      const handleUpdateCart = (id, qty) => {
        setCartItems(c => {
          if (qty <= 0) { const n = { ...c }; delete n[id]; return n; }
          return { ...c, [id]: qty };
        });
      };

      const handleCheckout = () => navigate("checkout");

      const handleConfirm = (data) => {
        setOrderData(data);
        setCartItems({});
        navigate("confirmation");
      };

      const handleNewOrder = () => {
        setShopId(null);
        navigate("home", null);
      };

      const handleContinueShopping = () => navigate("browse");

      const handleLoginSuccess = (userData) => setUser(userData);
      const handleSignupSuccess = (userData) => setUser(userData);
      const handleLogout = () => {
        localStorage.removeItem("customerAuth");
        setUser(null);
        setShopId(null);
        navigate("home", null);
      };

      // setPage shim so Shell can still call setPage("cart") etc.
      const setPage = (p) => navigate(p);

      if (!user) {
        if (authPage === "login") {
          return <CustomerLogin onLoginSuccess={handleLoginSuccess} onSignupClick={() => setAuthPage("signup")} onForgotClick={() => setAuthPage("forgot")} />;
        } else if (authPage === "signup") {
          return <CustomerSignup onSignupSuccess={handleSignupSuccess} onLoginClick={() => setAuthPage("login")} />;
        } else if (authPage === "forgot") {
          return <ForgotPassword onBack={() => setAuthPage("login")} />;
        }
      }

      const cartCount = Object.values(cartItems).reduce((s, q) => s + q, 0);

      const screens = {
        home: <CustomerHomepage onSelectShop={handleSelectShop} />,
        browse: shopId && <CustomerBrowse shopId={shopId} cartItems={cartItems} onAddToCart={handleAddToCart} onUpdateCart={handleUpdateCart} onChangeShop={handleSelectShop} />,
        cart: <CustomerCart shopId={shopId} cartItems={cartItems} onUpdateCart={handleUpdateCart} onCheckout={handleCheckout} onContinueShopping={handleContinueShopping} />,
        checkout: <CustomerCheckout shopId={shopId} cartItems={cartItems} onConfirm={handleConfirm} onBack={() => setPage("cart")} />,
        confirmation: orderData && <CustomerConfirmation orderData={orderData} onNewOrder={handleNewOrder} />,
      };

      return (
        <CustomerShell
          page={page}
          setPage={setPage}
          cartCount={cartCount}
          user={user}
          onLogout={handleLogout}
          onNavigate={screens[page]}
          shopId={shopId}
          onSelectShop={handleSelectShop}
        />
      );
    }

    try {
      console.log("🎯 Creating React root...");
      const root = ReactDOM.createRoot(document.getElementById("root"));
      console.log("🎯 Rendering CustomerApp...");
      root.render(<CustomerApp />);
      console.log("✅ App rendered successfully!");
    } catch (error) {
      console.error("❌ ERROR:", error);
      console.error("Stack:", error.stack);
      document.getElementById("root").innerHTML = `<div style="padding:20px; color:red; font-family:monospace;"><h2>Error loading app:</h2><pre>${error.message}\n\n${error.stack}</pre></div>`;
    }
  </script>
</body>
</html>
